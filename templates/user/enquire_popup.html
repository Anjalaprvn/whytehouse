<!-- Enquire Now Popup -->
<div id="enquirePopup" class="enquire-popup" style="display: none;">
    <div class="popup-overlay" onclick="closeEnquirePopup()"></div>
    <div class="popup-content">
        <div class="popup-header">
            <h3>Enquire Now</h3>
            <button class="close-btn" onclick="closeEnquirePopup()">&times;</button>
        </div>
        <form id="enquireForm" method="post" action="{% url 'user_panel:enquire_now' %}">
            {% csrf_token %}
            <input type="hidden" id="enquiry_type" name="enquiry_type" value="General">
            
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="full_name" id="enquire_name" required>
            </div>
            
            <div class="form-group">
                <label>Mobile Number *</label>
                <input type="tel" name="mobile_number" id="enquire_phone" required maxlength="10" pattern="[0-9]{10}" placeholder="Enter 10 digit phone number">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" id="enquire_email" placeholder="your.email@example.com">
            </div>
            
            <div class="form-group">
                <label>Place</label>
                <input type="text" name="place">
            </div>
            
            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="3" placeholder="Tell us about your requirements..."></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Submit Enquiry</button>
        </form>
    </div>
</div>

<style>
.enquire-popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
}

.popup-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
}

.popup-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border-radius: 12px;
    padding: 30px;
    width: 90%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
}

.popup-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 1px solid #eee;
    padding-bottom: 15px;
}

.popup-header h3 {
    margin: 0;
    color: #333;
    font-size: 24px;
}

.close-btn {
    background: none;
    border: none;
    font-size: 30px;
    cursor: pointer;
    color: #999;
    padding: 0;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.close-btn:hover {
    color: #333;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #333;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s;
}

.form-group input:focus,
.form-group textarea:focus {
    border-color: #d4a017;
    box-shadow: 0 0 0 3px rgba(212, 160, 23, 0.1);
}

.submit-btn {
    width: 100%;
    background: #d4a017;
    color: white;
    border: none;
    padding: 15px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s;
}

.submit-btn:hover {
    background: #b8860b;
}

.error-msg {
    color: #dc2626;
    font-size: 12px;
    margin-top: 5px;
}

.form-group input.error,
.form-group textarea.error {
    border-color: #dc2626;
}

@media (max-width: 600px) {
    .popup-content {
        padding: 20px;
        margin: 20px;
        width: calc(100% - 40px);
    }
}
</style>

<script>
function openEnquirePopup(enquiryType = 'General') {
    document.getElementById('enquiry_type').value = enquiryType;
    document.getElementById('enquirePopup').style.display = 'block';
    document.body.style.overflow = 'hidden';
}

function closeEnquirePopup() {
    document.getElementById('enquirePopup').style.display = 'none';
    document.body.style.overflow = 'auto';
    // Clear form and errors
    document.getElementById('enquireForm').reset();
    clearAllErrors();
}

function showError(input, message) {
    // Remove existing error
    const existingError = input.parentElement.querySelector('.error-msg');
    if (existingError) existingError.remove();
    
    // Add error message
    const errorDiv = document.createElement('div');
    errorDiv.className = 'error-msg';
    errorDiv.textContent = message;
    input.parentElement.appendChild(errorDiv);
    input.classList.add('error');
}

function clearError(input) {
    const existingError = input.parentElement.querySelector('.error-msg');
    if (existingError) existingError.remove();
    input.classList.remove('error');
}

function clearAllErrors() {
    const errors = document.querySelectorAll('.error-msg');
    errors.forEach(error => error.remove());
    const errorInputs = document.querySelectorAll('.error');
    errorInputs.forEach(input => input.classList.remove('error'));
}

// Close popup when clicking outside
document.addEventListener('DOMContentLoaded', function() {
    const nameInput = document.getElementById('enquire_name');
    const phoneInput = document.getElementById('enquire_phone');
    const emailInput = document.getElementById('enquire_email');
    
    // Validation patterns
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    
    // Real-time validation for name
    if (nameInput) {
        nameInput.addEventListener('input', function() {
            if (this.value.trim().length < 2 && this.value.length > 0) {
                showError(this, 'Name must be at least 2 characters');
            } else {
                clearError(this);
            }
        });
    }
    
    // Real-time validation for phone - only allow numbers, exactly 10 digits
    if (phoneInput) {
        phoneInput.addEventListener('input', function() {
            // Only allow digits (remove any non-digit characters)
            this.value = this.value.replace(/[^\d]/g, '');
            
            // Limit to 10 digits
            if (this.value.length > 10) {
                this.value = this.value.slice(0, 10);
            }
            
            if (this.value && this.value.length < 10) {
                showError(this, 'Phone number must be exactly 10 digits');
            } else if (this.value && this.value.length === 10) {
                clearError(this);
            }
        });
    }
    
    // Real-time validation for email
    if (emailInput) {
        emailInput.addEventListener('input', function() {
            if (this.value && !emailPattern.test(this.value)) {
                showError(this, 'Please enter a valid email address');
            } else {
                clearError(this);
            }
        });
    }
    
    // Form submission
    document.getElementById('enquireForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        let isValid = true;
        
        // Validate name
        if (nameInput.value.trim().length < 2) {
            showError(nameInput, 'Name is required (minimum 2 characters)');
            isValid = false;
        }
        
        // Validate phone - must be exactly 10 digits
        if (!phoneInput.value || phoneInput.value.length !== 10) {
            showError(phoneInput, 'Phone number must be exactly 10 digits');
            isValid = false;
        }
        
        // Validate email if provided
        if (emailInput.value && !emailPattern.test(emailInput.value)) {
            showError(emailInput, 'Please enter a valid email address');
            isValid = false;
        }
        
        if (!isValid) {
            return;
        }
        
        fetch('{% url "user_panel:enquire_now" %}', {
            method: 'POST',
            body: new FormData(this),
            headers: {
                'X-CSRFToken': this.querySelector('[name=csrfmiddlewaretoken]').value
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('Thank you! Your enquiry has been submitted successfully.');
                closeEnquirePopup();
                document.getElementById('enquireForm').reset();
            } else {
                alert('Error: ' + (data.error || 'Something went wrong'));
            }
        })
        .catch(error => {
            alert('Error submitting enquiry. Please try again.');
        });
    });
});
</script>
