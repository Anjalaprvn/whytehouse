<!-- Enquire Now Popup -->
<div id="enquirePopup" class="enquire-popup" style="display: none;">
    <div class="popup-overlay" onclick="closeEnquirePopup()"></div>
    <div class="popup-content">
        <div class="popup-header">
            <h3>Enquire Now</h3>
            <button class="close-btn" onclick="closeEnquirePopup()">&times;</button>
        </div>
        <form id="enquireForm" method="post" action="{% url 'user_panel:enquire_now' %}">
            {% csrf_token %}
            <input type="hidden" id="enquiry_type" name="enquiry_type" value="General">
            
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="full_name" required>
            </div>
            
            <div class="form-group">
                <label>Mobile Number *</label>
                <input type="tel" name="mobile_number" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email">
            </div>
            
            <div class="form-group">
                <label>Place</label>
                <input type="text" name="place">
            </div>
            
            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="3" placeholder="Tell us about your requirements..."></textarea>
            </div>
            
            <button type="submit" class="submit-btn">Submit Enquiry</button>
        </form>
    </div>
</div>

<style>
.enquire-popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
}

.popup-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
}

.popup-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    border-radius: 12px;
    padding: 30px;
    width: 90%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
}

.popup-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    border-bottom: 1px solid #eee;
    padding-bottom: 15px;
}

.popup-header h3 {
    margin: 0;
    color: #333;
    font-size: 24px;
}

.close-btn {
    background: none;
    border: none;
    font-size: 30px;
    cursor: pointer;
    color: #999;
    padding: 0;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.close-btn:hover {
    color: #333;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #333;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s;
}

.form-group input:focus,
.form-group textarea:focus {
    border-color: #d4a017;
    box-shadow: 0 0 0 3px rgba(212, 160, 23, 0.1);
}

.submit-btn {
    width: 100%;
    background: #d4a017;
    color: white;
    border: none;
    padding: 15px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s;
}

.submit-btn:hover {
    background: #b8860b;
}

@media (max-width: 600px) {
    .popup-content {
        padding: 20px;
        margin: 20px;
        width: calc(100% - 40px);
    }
}
</style>

<script>
function openEnquirePopup(enquiryType = 'General') {
    document.getElementById('enquiry_type').value = enquiryType;
    document.getElementById('enquirePopup').style.display = 'block';
    document.body.style.overflow = 'hidden';
}

function closeEnquirePopup() {
    document.getElementById('enquirePopup').style.display = 'none';
    document.body.style.overflow = 'auto';
}

// Close popup when clicking outside
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('enquireForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        fetch('{% url "user_panel:enquire_now" %}', {
            method: 'POST',
            body: new FormData(this),
            headers: {
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('Thank you! Your enquiry has been submitted successfully.');
                closeEnquirePopup();
                document.getElementById('enquireForm').reset();
            } else {
                alert('Error: ' + (data.error || 'Something went wrong'));
            }
        })
        .catch(error => {
            alert('Error submitting enquiry. Please try again.');
        });
    });
});
</script>
