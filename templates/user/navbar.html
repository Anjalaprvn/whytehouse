{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Whyte House Holidays{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent-orange: #DB902B;
            --text-dark: #1A1A1A;
            --text-gray: #666666;
            --border-light: #E0E0E0;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #000; overflow-x: hidden; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 50px 100px; position: absolute; top: 20px; width: 100%; background: transparent; z-index: 100; }
        .logo-img { height: 65px; width: auto; margin-top: -5px; margin-left: -10px; }

        .nav-center {
            background: var(--glass-bg); backdrop-filter: blur(25px); padding: 15px 45px;
            border-radius: 60px; display: flex; gap: 35px; border: 1px solid var(--glass-border);
        }
        .nav-center a { text-decoration: none; color: white; font-size: 15px; opacity: 0.8; transition: 0.3s; }
        .nav-center .active { opacity: 1; font-weight: 600; border-bottom: 2px solid var(--accent-orange); }

        .nav-right {
            background: var(--glass-bg); backdrop-filter: blur(25px); padding: 15px 30px;
            border-radius: 60px; border: 1px solid var(--glass-border); font-size: 15px;
        }
        .nav-right a { opacity: 0.7; transition: 0.3s; }
        .nav-right a:hover { opacity: 1; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav>
        <img src="{% static 'images/logo.png' %}" class="logo-img">
        <div class="nav-center">
            <a href="{% url 'user_panel:index' %}" id="nav-home-link" {% block nav_home %}{% endblock %}>Home</a>
            <a href="{% url 'user_panel:about' %}" {% block nav_about %}{% endblock %}>About</a>
            <a href="{% url 'user_panel:blog_list' %}" {% block nav_blog %}{% endblock %}>Blog</a>
            <a href="{% url 'user_panel:international_packages'%}" id="nav-packages-link" {% block nav_packages %}{% endblock %}>Packages</a>
            <a href="{% url 'user_panel:contact'%}" {% block nav_contact %}{% endblock %}>Contact Us</a>
        </div>
        <div class="nav-right">
            <a href="{% url 'user_panel:domestic' %}" id="domestic-toggle" style="text-decoration: none; color: rgba(255,255,255,0.6);">Domestic</a> | <a href="{% url 'user_panel:index' %}" id="international-toggle" style="text-decoration: none; color: rgba(255,255,255,0.6);">International</a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    {% include 'user/footer.html' %}

<script>
// Track and maintain section context (Domestic/International)
(function() {
    const currentPage = '{{ request.resolver_match.url_name }}';
    
    // Set section based on current page
    if (currentPage === 'domestic' || currentPage === 'domestic_packages') {
        sessionStorage.setItem('currentSection', 'domestic');
    } else if (currentPage === 'index' || currentPage === 'international_packages') {
        sessionStorage.setItem('currentSection', 'international');
    }
    
    // Get current section from storage
    const currentSection = sessionStorage.getItem('currentSection') || 'international';
    
    // Update Home and Packages links based on section
    const homeLink = document.getElementById('nav-home-link');
    const packagesLink = document.getElementById('nav-packages-link');
    const internationalToggle = document.getElementById('international-toggle');
    
    if (currentSection === 'domestic') {
        if (homeLink) homeLink.href = "{% url 'user_panel:domestic' %}";
        if (packagesLink) packagesLink.href = "{% url 'user_panel:domestic_packages' %}";
    } else {
        if (homeLink) homeLink.href = "{% url 'user_panel:index' %}";
        if (packagesLink) packagesLink.href = "{% url 'user_panel:international_packages' %}";
    }
    
    // Update International toggle to always point to international home
    if (internationalToggle) internationalToggle.href = "{% url 'user_panel:index' %}";
    
    // Update highlighting for Domestic/International toggle
    const domesticToggle = document.getElementById('domestic-toggle');
    
    if (currentSection === 'domestic') {
        if (domesticToggle) {
            domesticToggle.style.color = '#fff';
            domesticToggle.style.fontWeight = '600';
        }
        if (internationalToggle) {
            internationalToggle.style.color = 'rgba(255,255,255,0.6)';
            internationalToggle.style.fontWeight = 'normal';
        }
    } else {
        if (internationalToggle) {
            internationalToggle.style.color = '#fff';
            internationalToggle.style.fontWeight = '600';
        }
        if (domesticToggle) {
            domesticToggle.style.color = 'rgba(255,255,255,0.6)';
            domesticToggle.style.fontWeight = 'normal';
        }
    }
})();
</script>

</body>
</html>
