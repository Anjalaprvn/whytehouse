{% extends 'admin/sidebar.html' %}
{% load static %}

{% block extra_css %}
<style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --border:#ececf2;
      --text:#111318;
      --muted:#7a7f8c;
      --input:#f3f4f6;
      --shadow:0 10px 24px rgba(17,19,24,.06);
      --accent:#d4a42f;
      --danger:#e11d48;
      --radius:22px;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:"Poppins",sans-serif}
    body{background:var(--bg);color:var(--text)}

    .main{
      
      padding:34px 40px 70px;
    }

    /* ===== Header ===== */
    .page-top{
      display:flex;
      align-items:flex-start;
      gap:14px;
      margin-bottom:18px;
    }

    .back-btn{
      width:44px;height:44px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      display:grid;
      place-items:center;
      text-decoration:none;
      box-shadow:0 10px 22px rgba(17,19,24,.06);
      flex:0 0 auto;
    }
    .back-btn svg{width:20px;height:20px}

    .titles h1{
      font-size:38px;
      font-weight:600;
      line-height:1.15;
      margin-top:2px;
    }
    .titles p{
      color:var(--muted);
      font-size:16px;
      margin-top:6px;
    }

    /* ===== Card ===== */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
      max-width:1200px;
    }

    .card-title{
      font-size:18px;
      font-weight:600;
      margin-bottom:18px;
    }

    /* ===== Profile Upload ===== */
    .profile-row{
      display:flex;
      align-items:center;
      gap:22px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .avatar{
      width:120px;
      height:120px;
      border-radius:50%;
      background:#f3ead6;
      border:2px dashed #e6d7b3;
      display:grid;
      place-items:center;
      position:relative;
      overflow:hidden;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .avatar svg{
      width:36px;
      height:36px;
      opacity:.6;
    }

    .upload-box{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .upload-btn{
      display:inline-block;
      padding:10px 16px;
      border-radius:12px;
      border:1px solid var(--border);
      background:#fff;
      font-weight:600;
      cursor:pointer;
      width:max-content;
    }

    .upload-note{
      font-size:13px;
      color:var(--muted);
    }

    input[type="file"]{
      display:none;
    }

    /* ===== Form Grid ===== */
    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px 22px;
      margin-top:6px;
    }

    .field label{
      display:block;
      font-size:14px;
      font-weight:600;
      margin-bottom:6px;
    }

    .req{
      color:var(--danger);
      margin-left:4px;
      font-weight:700;
    }

    .input,
    .select{
      width:100%;
      border:1px solid transparent;
      background:var(--input);
      border-radius:14px;
      padding:14px 14px;
      font-size:15px;
      outline:none;
      transition:.2s ease;
    }

    .input:focus,
    .select:focus{
      background:#fff;
      border-color:#d9dbe4;
      box-shadow:0 0 0 4px rgba(212,164,47,.12);
    }

    /* ===== Buttons ===== */
    .btn-row{
      display:flex;
      gap:14px;
      margin-top:24px;
    }

    .btn{
      border-radius:14px;
      padding:12px 20px;
      font-weight:600;
      font-size:15px;
      cursor:pointer;
      border:1px solid var(--border);
      background:#fff;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:120px;
    }

    .btn-primary{
      background:var(--accent);
      border-color:transparent;
      color:#111;
      box-shadow:0 10px 18px rgba(212,164,47,.22);
    }

    .btn:active{transform:translateY(1px)}

    /* ===== Responsive ===== */
    @media (max-width:900px){
      .form-grid{grid-template-columns:1fr}
      .titles h1{font-size:32px}
      .main{padding:26px 18px 60px}
    }

    @media (max-width:720px){
      .main{margin-left:0}
    }
</style>
{% endblock %}

{% block content %}
<main class="main">

    <div class="page-top">
      <a class="back-btn" href="{% url 'employee:employee_list' %}">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M15 18L9 12L15 6" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>

      <div class="titles">
        <h1>Add New Employee</h1>
        <p>Enter employee details</p>
      </div>
    </div>

    <section class="card">
      <div class="card-title">Employee Information</div>

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Profile Upload -->
        <div class="profile-row">
          <div class="avatar" id="avatarPreview">
            <svg id="uploadIcon" viewBox="0 0 24 24" fill="none">
              <path d="M12 16V4" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
              <path d="M7 9L12 4L17 9" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5 20H19" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>

          <div class="upload-box">
            <label class="upload-btn">
              Upload Picture
              <input type="file" name="profile_picture" accept="image/*" id="profilePicture">
            </label>
            <div class="upload-note">
              Recommended: Square image, at least 200x200px
            </div>
          </div>
        </div>

        <!-- Form Fields -->
        <div class="form-grid">

          <div class="field">
            <label>Name <span class="req">*</span></label>
            <input class="input" type="text" name="name" placeholder="John Doe" required>
          </div>

          <div class="field">
            <label>Email <span class="req">*</span></label>
            <input class="input" type="email" name="email" placeholder="john@whitehouse.com" required>
          </div>

          <div class="field">
            <label>Phone <span class="req">*</span></label>
            <input class="input" type="tel" name="phone" placeholder="+91 9876543210" required>
          </div>

          <div class="field">
            <label>Role</label>
            <select class="select" name="role">
              <option value="">Select role</option>
              <option>Manager</option>
              <option>Sales Executive</option>
              <option>Tour Guide</option>
              <option>Operations</option>
              <option> Customer Support</option>
            </select>
          </div>

          <div class="field">
            <label>Department</label>
            <select class="select" name="department">
              <option value="">Select department</option>
              <option>Sales</option>
              <option>Operations</option>
              <option>Marketing</option>
              <opytion>Finance</option>
              <option>HR</option>
            </select>
          </div>

          <div class="field">
            <label>Join Date</label>
            <input class="input" type="date" name="join_date">
          </div>

          <div class="field">
            <label>Salary</label>
            <input class="input" type="number" name="salary" placeholder="₹50,000">
          </div>

          <div class="field">
            <label>Status</label>
            <select class="select" name="status">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
              <option value="On Leave">On Leave</option>
            </select>
          </div>

        </div>

        <div class="btn-row">
          <a href="{% url 'employee:employee_list' %}" class="btn">Cancel</a>
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>

      </form>
    </section>

</main>

<script>
  document.getElementById('profilePicture').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        const avatarDiv = document.getElementById('avatarPreview');
        avatarDiv.innerHTML = '<img src="' + event.target.result + '" alt="Preview">';
      };
      reader.readAsDataURL(file);
    }
  });
</script>
{% endblock %}
