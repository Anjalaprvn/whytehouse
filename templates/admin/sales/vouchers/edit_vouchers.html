{% extends 'admin/sidebar.html' %}

{% block content %}
<div class="main">
  <div class="content-section">
    <h2>Edit Voucher</h2>

    {% if error %}
      <div class="alert alert-danger" style="margin-bottom: 15px;">{{ error }}</div>
    {% endif %}

    <form method="POST" style="max-width: 600px;">
      {% csrf_token %}
      <div class="form-group" style="margin-bottom: 15px;">
        <label for="voucher_code" style="display: block; margin-bottom: 5px; font-weight: bold;">Voucher Code</label>
        <input type="text" id="voucher_code" name="voucher_code" value="{{ voucher.voucher_code }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div class="form-group" style="margin-bottom: 15px;">
        <label for="discount_amount" style="display: block; margin-bottom: 5px; font-weight: bold;">Discount Amount (Rs.)</label>
        <input type="number" id="discount_amount" name="discount_amount" step="0.01" value="{{ voucher.discount_amount }}" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div class="form-group" style="margin-bottom: 15px;">
        <label for="discount_percentage" style="display: block; margin-bottom: 5px; font-weight: bold;">Discount Percentage (%)</label>
        <input type="number" id="discount_percentage" name="discount_percentage" step="0.01" value="{{ voucher.discount_percentage }}" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div class="form-group" style="margin-bottom: 15px;">
        <label for="valid_from" style="display: block; margin-bottom: 5px; font-weight: bold;">Valid From</label>
        <input type="date" id="valid_from" name="valid_from" value="{{ voucher.valid_from }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div class="form-group" style="margin-bottom: 15px;">
        <label for="valid_till" style="display: block; margin-bottom: 5px; font-weight: bold;">Valid Till</label>
        <input type="date" id="valid_till" name="valid_till" value="{{ voucher.valid_till }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div class="form-group" style="margin-bottom: 15px;">
        <label for="description" style="display: block; margin-bottom: 5px; font-weight: bold;">Description</label>
        <textarea id="description" name="description" rows="4" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">{{ voucher.description }}</textarea>
      </div>

      <div class="form-group" style="margin-bottom: 15px;">
        <label for="status" style="display: block; margin-bottom: 5px; font-weight: bold;">Status</label>
        <select id="status" name="status" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
          <option value="Active" {% if voucher.status == 'Active' %}selected{% endif %}>Active</option>
          <option value="Expired" {% if voucher.status == 'Expired' %}selected{% endif %}>Expired</option>
          <option value="Redeemed" {% if voucher.status == 'Redeemed' %}selected{% endif %}>Redeemed</option>
        </select>
      </div>

      <div style="display: flex; gap: 10px;">
        <button type="submit" class="btn btn-success">Update Voucher</button>
        <a href="{% url 'sales:voucher_list' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
