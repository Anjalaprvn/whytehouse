{% extends 'admin/sidebar.html' %}
{% load static %}

{% block extra_css %}
<style>
:root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --border:#ececf2;
      --text:#111318;
      --muted:#7a7f8c;
      --input:#f3f4f6;
      --shadow:0 10px 24px rgba(17,19,24,.06);
      --accent:#d4a42f;
      --radius:22px;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:"Poppins",sans-serif}
    body{background:var(--bg);color:var(--text)}

    .main{
       /* sidebar width */
      padding:0px 40px 70px;
      margin-top:0px; /* account for header height */
    }

    /* Header */
    .header{
      display:flex;
      align-items:flex-start;
      gap:14px;
      margin-bottom:18px;
      max-width:1100px;
    }

    .back-btn{
      width:42px;height:42px;
      border:1px solid var(--border);
      background:#fff;
      border-radius:12px;
      display:grid;
      place-items:center;
      cursor:pointer;
      box-shadow:0 6px 14px rgba(0,0,0,.04);
    }

    .title h1{
      font-size:40px;
      font-weight:600;
      margin-bottom:6px;
    }
    .title p{
      color:var(--muted);
      font-size:15px;
    }

    /* Card */
    .card{
      max-width:1100px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }

    .card h3{
      font-size:18px;
      font-weight:600;
      margin-bottom:18px;
    }

    .field{margin-bottom:16px}
    .field label{
      display:block;
      font-size:13px;
      font-weight:600;
      margin-bottom:8px;
    }
    .req{color:#d13b3b;margin-left:4px}

    input, select{
      width:100%;
      border:1px solid transparent;
      background:var(--input);
      border-radius:12px;
      padding:14px 14px;
      font-size:14px;
      outline:none;
      transition:.2s ease;
    }
    input:focus, select:focus{
      background:#fff;
      border-color:#d9dbe4;
      box-shadow:0 0 0 4px rgba(212,164,47,.12);
    }

    /* select caret */
    .select-wrap{position:relative}
    select{
      appearance:none;
      -webkit-appearance:none;
      -moz-appearance:none;
      padding-right:44px;
      cursor:pointer;
    }
    .caret{
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      width:18px;height:18px;
      opacity:.65;
      pointer-events:none;
    }

    /* Footer buttons */
    .btn-row{
      display:flex;
      gap:14px;
      margin-top:22px;
    }
    .btn{
      border-radius:14px;
      padding:12px 22px;
      font-weight:600;
      cursor:pointer;
      border:1px solid var(--border);
      background:#fff;
    }
    .btn.primary{
      background:var(--accent);
      border-color:transparent;
      color:#111;
      box-shadow:0 10px 18px rgba(212,164,47,.22);
    }

    /* Help bubble */
    .help-fab{
      position:fixed;
      right:18px;
      bottom:18px;
      width:44px;height:44px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      display:grid;
      place-items:center;
      box-shadow:0 14px 26px rgba(0,0,0,.10);
      cursor:pointer;
    }
    .help-fab span{font-weight:700;color:#2a2d36}

    @media (max-width: 720px){
      .main{padding:22px 16px 60px}
      .title h1{font-size:32px}
    }
</style>
{% endblock %}

{% block content %}
<main class="main">

    <div class="header">
      <button class="back-btn" type="button" onclick="history.back()" aria-label="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M15 18L9 12L15 6" stroke="#1a1d24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="title">
        <h1>Add New Account</h1>
        <p>Enter bank account details</p>
      </div>
    </div>

    <section class="card">
      <h3>Account Information</h3>

      <form method="post">
        {% csrf_token %}

        <div class="field">
          <label>Account Name <span class="req">*</span></label>
          <input type="text" name="account_name" placeholder="White House Holidays" required>
        </div>

        <div class="field">
          <label>Account Number <span class="req">*</span></label>
          <input type="text" name="account_number" placeholder="1234567890" required>
        </div>

        <div class="field">
          <label>IFSC Code</label>
          <input type="text" name="ifsc_code" placeholder="HDFC0001234">
        </div>

        <div class="field">
          <label>Bank Name <span class="req">*</span></label>
          <input type="text" name="bank_name" placeholder="HDFC Bank" required>
        </div>

        <div class="field">
          <label>Branch Name</label>
          <input type="text" name="branch_name" placeholder="Mumbai Main Branch">
        </div>

        <div class="field">
          <label>Account Type</label>
          <div class="select-wrap">
            <select name="account_type">
              <option selected disabled>Select account type</option>
              <option>Current</option>
              <option>Savings</option>
              <option>Business</option>
            </select>
            <svg class="caret" viewBox="0 0 24 24" fill="none">
              <path d="M7 10L12 15L17 10" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>

        <div class="btn-row">
          <button type="button" class="btn" onclick="history.back()">Cancel</button>
          <button type="submit" class="btn primary">Submit</button>
        </div>
      </form>
    </section>

  </main>

  <button class="help-fab" type="button" aria-label="Help">
    <span>?</span>
  </button>
{% endblock %}
