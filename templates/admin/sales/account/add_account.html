{% extends 'admin/sidebar.html' %}
{% load static %}

{% block extra_css %}
<style>
:root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --border:#ececf2;
      --text:#111318;
      --muted:#7a7f8c;
      --input:#f3f4f6;
      --shadow:0 10px 24px rgba(17,19,24,.06);
      --accent:#d4a42f;
      --radius:22px;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:"Poppins",sans-serif}
    body{background:var(--bg);color:var(--text)}

    .main{
       /* sidebar width */
      padding:0px 40px 70px;
      margin-top:0px; /* account for header height */
    }

    /* Header */
    .header{
      display:flex;
      align-items:flex-start;
      gap:14px;
      margin-bottom:18px;
      max-width:1100px;
    }

    .back-btn{
      width:42px;height:42px;
      border:1px solid var(--border);
      background:#fff;
      border-radius:12px;
      display:grid;
      place-items:center;
      cursor:pointer;
      box-shadow:0 6px 14px rgba(0,0,0,.04);
    }

    .title h1{
      font-size:40px;
      font-weight:600;
      margin-bottom:6px;
    }
    .title p{
      color:var(--muted);
      font-size:15px;
    }

    /* Card */
    .card{
      max-width:1100px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }

    .card h3{
      font-size:18px;
      font-weight:600;
      margin-bottom:18px;
    }

    .field{margin-bottom:16px}
    .field label{
      display:block;
      font-size:13px;
      font-weight:600;
      margin-bottom:8px;
    }
    .req{color:#d13b3b;margin-left:4px}

    input, select{
      width:100%;
      border:1px solid transparent;
      background:var(--input);
      border-radius:12px;
      padding:14px 14px;
      font-size:14px;
      outline:none;
      transition:.2s ease;
    }
    input:focus, select:focus{
      background:#fff;
      border-color:#d9dbe4;
      box-shadow:0 0 0 4px rgba(212,164,47,.12);
    }

    /* select caret */
    .select-wrap{position:relative}
    select{
      appearance:none;
      -webkit-appearance:none;
      -moz-appearance:none;
      padding-right:44px;
      cursor:pointer;
    }
    .caret{
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      width:18px;height:18px;
      opacity:.65;
      pointer-events:none;
    }

    /* Footer buttons */
    .btn-row{
      display:flex;
      gap:14px;
      margin-top:22px;
    }
    .btn{
      border-radius:14px;
      padding:12px 22px;
      font-weight:600;
      cursor:pointer;
      border:1px solid var(--border);
      background:#fff;
    }
    .btn.primary{
      background:var(--accent);
      border-color:transparent;
      color:#111;
      box-shadow:0 10px 18px rgba(212,164,47,.22);
    }

    /* Help bubble */
    .help-fab{
      position:fixed;
      right:18px;
      bottom:18px;
      width:44px;height:44px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      display:grid;
      place-items:center;
      box-shadow:0 14px 26px rgba(0,0,0,.10);
      cursor:pointer;
    }
    .help-fab span{font-weight:700;color:#2a2d36}

    .err-msg{
      display:none;
      color:#d13b3b;
      font-size:12px;
      margin-top:5px;
    }
    input.invalid, select.invalid{
      border-color:#d13b3b !important;
      background:#fff5f5;
    }

    @media (max-width: 720px){
      .main{padding:22px 16px 60px}
      .title h1{font-size:32px}
    }
</style>
{% endblock %}

{% block content %}
<main class="main">

    <div class="header">
      <button class="back-btn" type="button" onclick="history.back()" aria-label="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M15 18L9 12L15 6" stroke="#1a1d24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="title">
        <h1>Add New Account</h1>
        <p>Enter bank account details</p>
      </div>
    </div>

    <section class="card">
      <h3>Account Information</h3>

      <form method="post" id="accountForm" novalidate>
        {% csrf_token %}

        <div class="field">
          <label>Account Name <span class="req">*</span></label>
          <input type="text" id="account_name" name="account_name" placeholder="White House Holidays">
          <span class="err-msg" id="err_account_name"></span>
        </div>

        <div class="field">
          <label>Account Number <span class="req">*</span></label>
          <input type="text" id="account_number" name="account_number" placeholder="1234567890">
          <span class="err-msg" id="err_account_number"></span>
        </div>

        <div class="field">
          <label>IFSC Code</label>
          <input type="text" id="ifsc_code" name="ifsc_code" placeholder="HDFC0001234">
          <span class="err-msg" id="err_ifsc_code"></span>
        </div>

        <div class="field">
          <label>Bank Name <span class="req">*</span></label>
          <input type="text" id="bank_name" name="bank_name" placeholder="HDFC Bank">
          <span class="err-msg" id="err_bank_name"></span>
        </div>

        <div class="field">
          <label>Branch Name</label>
          <input type="text" id="branch_name" name="branch_name" placeholder="Mumbai Main Branch">
          <span class="err-msg" id="err_branch_name"></span>
        </div>

        <div class="field">
          <label>Account Type <span class="req">*</span></label>
          <div class="select-wrap">
            <select id="account_type" name="account_type">
              <option value="" selected disabled>Select account type</option>
              <option value="savings">Savings</option>
              <option value="current">Current</option>
              <option value="business">Business</option>
            </select>
            <svg class="caret" viewBox="0 0 24 24" fill="none">
              <path d="M7 10L12 15L17 10" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="err-msg" id="err_account_type"></span>
        </div>

        <div class="btn-row">
          <button type="button" class="btn" onclick="history.back()">Cancel</button>
          <button type="submit" class="btn primary">Submit</button>
        </div>
      </form>
    </section>

  </main>

  <button class="help-fab" type="button" aria-label="Help">
    <span>?</span>
  </button>

<script>
  function showErr(id, msg) {
    const el = document.getElementById('err_' + id);
    const input = document.getElementById(id);
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
    input.classList.toggle('invalid', !!msg);
  }

  // letters + spaces only (no digits, no special chars)
  function liveLettersOnly(id, label) {
    const val = document.getElementById(id).value.trim();
    if (!val) { showErr(id, ''); return; }
    if (!/^[A-Za-z\s]+$/.test(val)) showErr(id, label + ' must contain letters only.');
    else showErr(id, '');
  }

  function liveNumberOnly(id, label) {
    const val = document.getElementById(id).value.trim();
    if (!val) { showErr(id, ''); return; }
    if (!/^\d+$/.test(val)) showErr(id, label + ' must contain digits only.');
    else showErr(id, '');
  }

  function liveIFSC(id) {
    const input = document.getElementById(id);
    input.value = input.value.toUpperCase();
    const val = input.value.trim();
    if (!val) { showErr(id, ''); return; }
    if (!/^[A-Z0-9]+$/.test(val)) showErr(id, 'IFSC Code must be alphanumeric only.');
    else showErr(id, '');
  }

  // AJAX duplicate check for account number
  let dupTimer = null;
  let accountNumberDuplicate = false;
  document.getElementById('account_number').addEventListener('input', function() {
    liveNumberOnly('account_number', 'Account Number');
    accountNumberDuplicate = false;
    clearTimeout(dupTimer);
    const val = this.value.trim();
    if (!val || !/^\d+$/.test(val)) return;
    dupTimer = setTimeout(() => {
      fetch('{% url "sales:check_account_number" %}?number=' + encodeURIComponent(val))
        .then(r => r.json())
        .then(data => {
          accountNumberDuplicate = data.exists;
          if (data.exists) showErr('account_number', 'This account number already exists.');
          else showErr('account_number', '');
        });
    }, 400);
  });

  document.getElementById('account_name').addEventListener('input', () => liveLettersOnly('account_name', 'Account Name'));
  document.getElementById('ifsc_code').addEventListener('input', () => liveIFSC('ifsc_code'));
  document.getElementById('bank_name').addEventListener('input', () => liveLettersOnly('bank_name', 'Bank Name'));
  document.getElementById('branch_name').addEventListener('input', () => liveLettersOnly('branch_name', 'Branch Name'));
  document.getElementById('account_type').addEventListener('change', () => showErr('account_type', ''));

  document.getElementById('accountForm').addEventListener('submit', function(e) {
    let valid = true;

    const name = document.getElementById('account_name').value.trim();
    if (!name) { showErr('account_name', 'Account Name is required.'); valid = false; }
    else if (!/^[A-Za-z\s]+$/.test(name)) { showErr('account_name', 'Account Name must contain letters only.'); valid = false; }

    const num = document.getElementById('account_number').value.trim();
    if (!num) { showErr('account_number', 'Account Number is required.'); valid = false; }
    else if (!/^\d+$/.test(num)) { showErr('account_number', 'Account Number must contain digits only.'); valid = false; }
    else if (accountNumberDuplicate) { showErr('account_number', 'This account number already exists.'); valid = false; }

    const ifsc = document.getElementById('ifsc_code').value.trim();
    if (ifsc && !/^[A-Z0-9]+$/.test(ifsc)) { showErr('ifsc_code', 'IFSC Code must be alphanumeric only.'); valid = false; }

    const bank = document.getElementById('bank_name').value.trim();
    if (!bank) { showErr('bank_name', 'Bank Name is required.'); valid = false; }
    else if (!/^[A-Za-z\s]+$/.test(bank)) { showErr('bank_name', 'Bank Name must contain letters only.'); valid = false; }

    const branch = document.getElementById('branch_name').value.trim();
    if (branch && !/^[A-Za-z\s]+$/.test(branch)) { showErr('branch_name', 'Branch Name must contain letters only.'); valid = false; }

    const type = document.getElementById('account_type').value;
    if (!type) { showErr('account_type', 'Please select an Account Type.'); valid = false; }

    if (!valid) e.preventDefault();
  });
</script>
{% endblock %}
