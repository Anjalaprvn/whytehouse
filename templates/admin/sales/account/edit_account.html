{% extends 'admin/sidebar.html' %}
{% load static %}

{% block extra_css %}
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --border:#ececf2;
      --text:#111318;
      --muted:#7a7f8c;
      --input:#f3f4f6;
      --shadow:0 10px 24px rgba(17,19,24,.06);
      --accent:#d4a42f;
      --danger:#e11d48;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:"Poppins",sans-serif}
    body{background:var(--bg);color:var(--text)}

    /* main offset for sidebar */
    .main{
      padding:30px 40px 60px;
    }

    /* Card */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:22px;
    }

    /* Header row */
    .card-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:6px 6px 16px;
    }
    .card-head h3{
      font-size:20px;
      font-weight:600;
    }

/* Form styles */
    .form-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:22px;
      margin-top:22px;
    }
    .form-group{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .form-group label{
      font-size:15px;
      font-weight:500;
    }
    .form-group input, .form-group select{
      padding:14px;
      border:1px solid var(--border);
      border-radius:14px;
      background:var(--input);
      font-size:15px;
    }
    .form-group input:focus, .form-group select:focus{
      outline:none;
      border-color:var(--accent);
      background:#fff;
    }

    /* Submit button */
    .btn-submit{
      display:inline-flex;
      align-items:center;
      gap:10px;
      background:var(--accent);
      color:#111;
      border:none;
      border-radius:14px;
      padding:14px 22px;
      font-weight:600;
      cursor:pointer;
      box-shadow:0 10px 18px rgba(212,164,47,.22);
      white-space:nowrap;
      margin-top:10px;
    }
    .btn-submit svg{width:18px;height:18px}

    .header{
      display:flex;
      align-items:flex-start;
      gap:14px;
      margin-bottom:18px;
    }
    .back-btn{
      width:42px;height:42px;
      border:1px solid var(--border);
      background:#fff;
      border-radius:12px;
      display:grid;
      place-items:center;
      cursor:pointer;
      box-shadow:0 6px 14px rgba(0,0,0,.04);
      flex-shrink:0;
    }
    .title h1{
      font-size:40px;
      font-weight:600;
      margin-bottom:6px;
    }
    .title p{
      color:var(--muted);
      font-size:15px;
    }

    @media (max-width: 900px){
      .page-title{font-size:34px}
      .form-grid{grid-template-columns:1fr}
    }
    @media (max-width: 720px){
      .main{margin-left:0}
    }
  </style>
{% endblock %}

{% block content %}
<main class="main">

    <div class="header">
      <button class="back-btn" onclick="history.back()" type="button" aria-label="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M15 18L9 12L15 6" stroke="#1a1d24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="title">
        <h1>Edit Account</h1>
        <p>Update account information</p>
      </div>
    </div>

    <section class="card">
      <div class="card-head">
        <h3>Edit Account: {{ account.account_name }}</h3>
      </div>

      {% if error %}
      <div style="background:#f8d7da; border:1px solid #f5c6cb; border-radius:12px; padding:20px; margin:20px; color:#721c24; font-weight:500; font-size:16px; text-align:center;">
        <strong>✗ Error:</strong> {{ error }}
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-grid">
          <div class="form-group">
            <label for="account_name">Account Name *</label>
            <input type="text" id="account_name" name="account_name" value="{{ account.account_name }}" required>
          </div>

          <div class="form-group">
            <label for="account_number">Account Number *</label>
            <input type="text" id="account_number" name="account_number" value="{{ account.account_number }}" required>
          </div>

          <div class="form-group">
            <label for="bank_name">Bank Name *</label>
            <input type="text" id="bank_name" name="bank_name" value="{{ account.bank_name }}" required>
          </div>

          <div class="form-group">
            <label for="ifsc_code">IFSC Code *</label>
            <input type="text" id="ifsc_code" name="ifsc_code" value="{{ account.ifsc_code }}" required>
          </div>

          <div class="form-group">
            <label for="account_type">Account Type</label>
            <select id="account_type" name="account_type">
              <option value="savings" {% if account.account_type == 'savings' %}selected{% endif %}>Savings</option>
              <option value="current" {% if account.account_type == 'current' %}selected{% endif %}>Current</option>
              <option value="fixed_deposit" {% if account.account_type == 'fixed_deposit' %}selected{% endif %}>Fixed Deposit</option>
              <option value="recurring_deposit" {% if account.account_type == 'recurring_deposit' %}selected{% endif %}>Recurring Deposit</option>
            </select>
          </div>
        </div>

        <button type="submit" class="btn-submit">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Update Account
        </button>
      </form>
    </section>
</main>
{% endblock %}
