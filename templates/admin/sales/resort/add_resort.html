{% extends 'admin/sidebar.html' %}
{% load static %}

{% block extra_css %}
<style>
:root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --border:#ececf2;
      --text:#111318;
      --muted:#7a7f8c;
      --input:#f3f4f6;
      --shadow:0 10px 24px rgba(17,19,24,.06);
      --accent:#d4a42f;
      --radius:22px;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:"Poppins",sans-serif}
    body{background:var(--bg);color:var(--text)}

    .main{
      
      padding:30px 40px 70px;
    }

    /* Header */
    .header{
      display:flex;
      align-items:flex-start;
      gap:14px;
      margin-bottom:18px;
      max-width:1100px;
    }

    .back-btn{
      width:42px;height:42px;
      border:1px solid var(--border);
      background:#fff;
      border-radius:12px;
      display:grid;
      place-items:center;
      cursor:pointer;
      box-shadow:0 6px 14px rgba(0,0,0,.04);
    }

    .title h1{
      font-size:40px;
      font-weight:600;
      margin-bottom:6px;
    }
    .title p{
      color:var(--muted);
      font-size:15px;
    }

    /* Card */
    .card{
      max-width:1100px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }

    .card h3{
      font-size:18px;
      font-weight:600;
      margin-bottom:18px;
    }

    /* Grid */
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }
    .span-2{grid-column:1/-1}

    .field label{
      display:block;
      font-size:13px;
      font-weight:600;
      margin-bottom:8px;
    }
    .req{color:#d13b3b;margin-left:4px}

    input{
      width:100%;
      border:1px solid transparent;
      background:var(--input);
      border-radius:12px;
      padding:14px 14px;
      font-size:14px;
      outline:none;
      transition:.2s ease;
    }

    input:focus{
      background:#fff;
      border-color:#d9dbe4;
      box-shadow:0 0 0 4px rgba(212,164,47,.12);
    }

    /* CC email row */
    .cc-row{
      display:flex;
      gap:10px;
    }
    .cc-row input{flex:1}

    .btn-add{
      background:var(--accent);
      border:none;
      border-radius:12px;
      padding:12px 18px;
      font-weight:600;
      cursor:pointer;
      white-space:nowrap;
      box-shadow:0 10px 18px rgba(212,164,47,.22);
    }

    /* Footer buttons */
    .btn-row{
      display:flex;
      gap:14px;
      margin-top:22px;
    }

    .btn{
      border-radius:14px;
      padding:12px 22px;
      font-weight:600;
      cursor:pointer;
      border:1px solid var(--border);
      background:#fff;
    }

    .btn.primary{
      background:var(--accent);
      border-color:transparent;
      color:#111;
      box-shadow:0 10px 18px rgba(212,164,47,.22);
    }

    /* Help bubble */
    .help-fab{
      position:fixed;
      right:18px;
      bottom:18px;
      width:44px;height:44px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      display:grid;
      place-items:center;
      box-shadow:0 14px 26px rgba(0,0,0,.10);
      cursor:pointer;
    }
    .help-fab span{font-weight:700;color:#2a2d36}

    @media (max-width: 720px){
      .main{padding:22px 16px 60px}
      .grid{grid-template-columns:1fr}
      .title h1{font-size:32px}
      .cc-row{flex-direction:column}
    }
</style>
{% endblock %}

{% block content %}
<main class="main">

    <div class="header">
      <button class="back-btn" onclick="history.back()" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M15 18L9 12L15 6" stroke="#1a1d24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="title">
        <h1>Add New Resort</h1>
        <p>Enter resort details</p>
      </div>
    </div>

    <section class="card">
      <h3>Resort Information</h3>

      <form method="post">
        {% csrf_token %}

        <div class="grid">
          <!-- Resort Name -->
          <div class="field span-2">
            <label>Resort Name <span class="req">*</span></label>
            <input type="text" name="resort_name" placeholder="Paradise Beach Resort" required>
          </div>

          <!-- Resort Place -->
          <div class="field span-2">
            <label>Resort Place <span class="req">*</span></label>
            <input type="text" name="resort_place" placeholder="Goa, India" required>
          </div>

          <!-- Mobile -->
          <div class="field span-2">
            <label>Mobile</label>
            <input type="text" name="mobile" placeholder="+91 9876543210">
          </div>

          <!-- Email -->
          <div class="field span-2">
            <label>Email <span class="req">*</span></label>
            <input type="email" name="email" placeholder="resort@example.com" required>
          </div>

          <!-- CC Emails -->
          <div class="field span-2">
            <label>CC Emails</label>
            <div id="cc-container">
              <div class="cc-row">
                <input type="email" name="cc_email[]" placeholder="cc@example.com">
                <button type="button" class="btn-add" onclick="addCCEmail()">Add</button>
              </div>
            </div>
          </div>

          <!-- Location -->
          <div class="field span-2">
            <label>Location <span class="req">*</span></label>
            <input type="text" name="location" placeholder="https://maps.google.com/..." required>
          </div>
        </div>

        <div class="btn-row">
          <button type="button" class="btn" onclick="history.back()">Cancel</button>
          <button type="submit" class="btn primary">Submit</button>
        </div>
      </form>
    </section>

  </main>

  <button class="help-fab"><span>?</span></button>

  <script>
    function addCCEmail() {
      const container = document.getElementById('cc-container');
      const newRow = document.createElement('div');
      newRow.className = 'cc-row';
      newRow.style.marginTop = '10px';
      newRow.innerHTML = '<input type="email" name="cc_email[]" placeholder="cc@example.com">';
      container.appendChild(newRow);
    }
  </script>
{% endblock %}
