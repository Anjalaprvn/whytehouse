{% extends 'admin/sidebar.html' %}
{% load static %}

{% block extra_css %}
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --border:#ececf2;
      --text:#111318;
      --muted:#7a7f8c;
      --input:#f3f4f6;
      --shadow:0 10px 24px rgba(17,19,24,.06);
      --accent:#d4a42f;
      --radius:22px;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:"Poppins",sans-serif}
    body{background:var(--bg);color:var(--text)}

    /* main offset for sidebar */
    .main{
      padding:30px 40px 70px;
    }

    /* Header */
    .header{
      display:flex;
      align-items:flex-start;
      gap:14px;
      margin:8px 0 18px;
      max-width:1100px;
    }
    .back-btn{
      width:42px;height:42px;
      border:1px solid var(--border);
      background:#fff;
      border-radius:12px;
      display:grid;
      place-items:center;
      cursor:pointer;
      box-shadow:0 6px 14px rgba(0,0,0,.04);
    }
    .title h1{
      font-size:40px;
      font-weight:600;
      margin-bottom:6px;
    }
    .title p{
      color:var(--muted);
      font-size:15px;
    }

    /* Card */
    .card{
      max-width:1100px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }

    .card h3{
      font-size:18px;
      font-weight:600;
      margin-bottom:18px;
    }

    /* Error message */
    .error-message{
      background:#fee;
      border:1px solid #fcc;
      border-radius:12px;
      padding:16px;
      margin-bottom:20px;
      color:#c33;
    }

    /* Grid */
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:18px;
    }
    .span-3{grid-column:1/-1}
    .span-2{grid-column:1/span 2}

    .field label{
      display:block;
      font-size:13px;
      font-weight:600;
      margin-bottom:8px;
    }
    .req{color:#d13b3b;margin-left:4px}

    input, select{
      width:100%;
      border:1px solid transparent;
      background:var(--input);
      border-radius:12px;
      padding:14px 14px;
      font-size:14px;
      outline:none;
      transition:.2s ease;
    }
    input:focus, select:focus{
      background:#fff;
      border-color:#d9dbe4;
      box-shadow:0 0 0 4px rgba(212,164,47,.12);
    }

    /* Select caret */
    .select-wrap{position:relative}
    select{
      appearance:none;
      -webkit-appearance:none;
      -moz-appearance:none;
      padding-right:44px;
      cursor:pointer;
    }
    .caret{
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      width:18px;height:18px;
      opacity:.65;
      pointer-events:none;
    }

    /* Toggle row */
    .toggle-row{
      display:flex;
      align-items:center;
      gap:14px;
      margin-top:8px;
    }
    .toggle-row span{
      font-weight:600;
      color:#111;
      font-size:15px;
    }

    .switch{position:relative;width:54px;height:30px;display:inline-block}
    .switch input{display:none}
    .slider{
      position:absolute;inset:0;background:#e4e6ee;border-radius:999px;
      transition:.2s ease;border:1px solid #dde0ea;
    }
    .slider:before{
      content:"";
      position:absolute;height:24px;width:24px;left:3px;top:50%;
      transform:translateY(-50%);
      background:#fff;border-radius:50%;
      box-shadow:0 6px 14px rgba(0,0,0,.12);
      transition:.2s ease;
    }
    .switch input:checked + .slider{
      background:rgba(212,164,47,.95);
      border-color:rgba(212,164,47,.95);
    }
    .switch input:checked + .slider:before{
      transform:translate(24px,-50%);
    }

    /* Footer buttons */
    .btn-row{
      display:flex;
      gap:14px;
      margin-top:22px;
    }
    .btn{
      border-radius:14px;
      padding:12px 22px;
      font-weight:600;
      cursor:pointer;
      border:1px solid var(--border);
      background:#fff;
    }
    .btn.primary{
      background:var(--accent);
      border-color:transparent;
      color:#111;
      box-shadow:0 10px 18px rgba(212,164,47,.22);
    }

    @media (max-width: 980px){
      .grid{grid-template-columns:1fr 1fr}
      .span-2{grid-column:1/-1}
    }
    @media (max-width: 720px){
      .main{margin-left:0;padding:22px 16px 60px}
      .grid{grid-template-columns:1fr}
      .span-3,.span-2{grid-column:1/-1}
      .title h1{font-size:32px}
    }
  </style>
{% endblock %}

{% block content %}
    <div class="header">
      <button class="back-btn" type="button" onclick="history.back()" aria-label="Back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M15 18L9 12L15 6" stroke="#1a1d24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="title">
        <h1>Edit Customer</h1>
        <p>Update customer details</p>
      </div>
    </div>

    <section class="card">
      <h3>Customer Information</h3>

      {% if error %}
      <div class="error-message">
        <strong>Error:</strong> {{ error }}
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="grid">
          <!-- Customer Type -->
          <div class="field span-3">
            <label>Customer Type <span class="req">*</span></label>
            <div class="select-wrap">
              <select name="customer_type" required>
                <option value="Individual" {% if customer.customer_type == "Individual" %}selected{% endif %}>Individual</option>
                <option value="Business" {% if customer.customer_type == "Business" %}selected{% endif %}>Business</option>
              </select>
              <svg class="caret" viewBox="0 0 24 24" fill="none">
                <path d="M7 10L12 15L17 10" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>

          <!-- Salutation -->
          <div class="field">
            <label>Salutation</label>
            <div class="select-wrap">
              <select name="salutation">
                <option value="" {% if not customer.salutation %}selected{% endif %}>Select</option>
                <option value="Mr." {% if customer.salutation == "Mr." %}selected{% endif %}>Mr.</option>
                <option value="Ms." {% if customer.salutation == "Ms." %}selected{% endif %}>Ms.</option>
                <option value="Mrs." {% if customer.salutation == "Mrs." %}selected{% endif %}>Mrs.</option>
                <option value="Dr." {% if customer.salutation == "Dr." %}selected{% endif %}>Dr.</option>
              </select>
              <svg class="caret" viewBox="0 0 24 24" fill="none">
                <path d="M7 10L12 15L17 10" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>

          <!-- First Name -->
          <div class="field">
            <label>First Name <span class="req">*</span></label>
            <input type="text" name="first_name" value="{{ customer.first_name }}" required />
          </div>

          <!-- Last Name -->
          <div class="field">
            <label>Last Name</label>
            <input type="text" name="last_name" value="{{ customer.last_name|default:"" }}" />
          </div>

          <!-- Customer Display Name -->
          <div class="field span-3">
            <label>Customer Display Name <span class="req">*</span></label>
            <input type="text" name="display_name" value="{{ customer.display_name }}" required />
          </div>

          <!-- Customer Place -->
          <div class="field span-3">
            <label>Customer Place</label>
            <input type="text" name="place" value="{{ customer.place|default:"" }}" />
          </div>

          <!-- Contact Number -->
          <div class="field span-3">
            <label>Contact Number <span class="req">*</span></label>
            <input type="text" name="contact_number" value="{{ customer.contact_number }}" placeholder="+91 9876543210" required />
          </div>

          <!-- Toggle -->
          <div class="field span-3">
            <div class="toggle-row">
              <label class="switch" aria-label="Same as WhatsApp number">
                <input type="checkbox" name="same_as_whatsapp" {% if customer.same_as_whatsapp %}checked{% endif %} />
                <span class="slider"></span>
              </label>
              <span>Same as WhatsApp number</span>
            </div>
          </div>

          <!-- WhatsApp Number -->
          <div class="field span-3">
            <label>WhatsApp Number</label>
            <input type="text" name="whatsapp_number" value="{{ customer.whatsapp_number|default:"" }}" placeholder="+91 9876543210" />
          </div>

          <!-- Work Number -->
          <div class="field span-3">
            <label>Work Number</label>
            <input type="text" name="work_number" value="{{ customer.work_number|default:"" }}" />
          </div>

          <!-- GST Number -->
          <div class="field span-3">
            <label>GST Number</label>
            <input type="text" name="gst_number" value="{{ customer.gst_number|default:"" }}" />
          </div>
        </div>

        <div class="btn-row">
          <button class="btn" type="button" onclick="history.back()">Cancel</button>
          <button class="btn primary" type="submit">Update Customer</button>
        </div>
      </form>
    </section>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const sameAsWhatsapp = document.querySelector('input[name="same_as_whatsapp"]');
      const whatsappField = document.querySelector('input[name="whatsapp_number"]');
      const contactField = document.querySelector('input[name="contact_number"]');
      
      function toggleWhatsappField() {
        if (sameAsWhatsapp.checked) {
          whatsappField.value = contactField.value;
          whatsappField.disabled = true;
          whatsappField.style.backgroundColor = '#f0f0f0';
        } else {
          whatsappField.disabled = false;
          whatsappField.style.backgroundColor = '';
        }
      }
      
      // Initial check
      toggleWhatsappField();
      
      // Listen for changes
      sameAsWhatsapp.addEventListener('change', toggleWhatsappField);
      contactField.addEventListener('input', function() {
        if (sameAsWhatsapp.checked) {
          whatsappField.value = this.value;
        }
      });
    });
  </script>
{% endblock %}
