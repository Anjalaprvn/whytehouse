{% extends 'admin/sidebar.html' %}
{% load static %}

{% block extra_css %}
<style>
:root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --border:#ececf2;
      --text:#111318;
      --muted:#7a7f8c;
      --input:#f3f4f6;
      --shadow:0 10px 24px rgba(17,19,24,.06);
      --accent:#d4a42f;
      --radius:22px;
      --danger:#e11d48;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:"Poppins",sans-serif}
    body{background:var(--bg);color:var(--text)}

    /* main offset for sidebar */
    .main{
       /* match sidebar width */
      padding:34px 40px 70px;
    }

    /* Page top */
    .page-top{
      display:flex;
      align-items:flex-start;
      gap:14px;
      margin-bottom:18px;
    }
    .back-btn{
      width:44px;height:44px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      display:grid;
      place-items:center;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(17,19,24,.06);
      text-decoration:none;
    }
    .back-btn svg{width:20px;height:20px}

    .titles h1{
      font-size:40px;
      font-weight:600;
      line-height:1.15;
      margin-top:2px;
    }
    .titles p{
      color:var(--muted);
      font-size:16px;
      margin-top:6px;
    }

    /* Card */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:22px;
      max-width:1100px;
    }

    .section-title{
      font-size:18px;
      font-weight:600;
      margin:6px 0 16px;
    }

    /* Form grid */
    .form-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:18px;
    }

    .field label{
      display:block;
      font-size:14px;
      font-weight:600;
      margin:0 0 8px;
    }
    .req{
      color:var(--danger);
      margin-left:6px;
      font-weight:700;
    }

    .input, .textarea{
      width:100%;
      border:1px solid var(--border);
      background:var(--input);
      border-radius:14px;
      padding:14px 14px;
      font-size:15px;
      outline:none;
      transition:.2s ease;
    }
    .input:focus, .textarea:focus{
      background:#fff;
      border-color:#d9d9e6;
      box-shadow:0 0 0 4px rgba(212,164,47,.14);
    }
    .textarea{
      min-height:90px;
      resize:vertical;
      padding-top:14px;
      line-height:1.45;
    }

    /* Included Meals */
    .meals-block{
      margin-top:2px;
    }
    .meals-title{
      font-size:14px;
      font-weight:600;
      margin:0 0 10px;
    }
    .meals-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap:16px;
    }

    .meal-option{
      position:relative;
      border:1px solid var(--border);
      border-radius:16px;
      background:#fff;
      padding:14px 14px;
      display:flex;
      align-items:center;
      gap:12px;
      cursor:pointer;
      transition:.2s ease;
      min-height:54px;
    }
    .meal-option:hover{
      box-shadow:0 10px 22px rgba(17,19,24,.06);
      transform:translateY(-1px);
    }

    .meal-option input{
      width:18px;height:18px;
      accent-color:var(--accent);
    }
    .meal-option span{
      font-size:16px;
      font-weight:600;
    }

    /* Buttons row */
    .btn-row{
      display:flex;
      justify-content:flex-start;
      gap:14px;
      margin-top:18px;
      padding-top:6px;
    }
    .btn{
      border-radius:14px;
      padding:12px 18px;
      font-weight:600;
      font-size:15px;
      cursor:pointer;
      border:1px solid var(--border);
      background:#fff;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:120px;
    }
    .btn-primary{
      background:var(--accent);
      border-color:transparent;
      color:#111;
      box-shadow:0 10px 18px rgba(212,164,47,.22);
    }
    .btn:active{transform:translateY(1px)}

    /* Responsive */
    @media (max-width: 980px){
      .titles h1{font-size:34px}
      .main{padding:26px 18px 60px}
      .meals-grid{grid-template-columns:1fr}
      .card{max-width:100%}
    }
    @media (max-width: 720px){
      .main{margin-left:0}
    }
</style>
{% endblock %}

{% block content %}
<main class="main">

    <div class="page-top">
      <!-- change URL name as your list page -->
      <a class="back-btn" href="{% url 'sales:meal_list' %}" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M15 18L9 12L15 6" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>

      <div class="titles">
        <h1>Add New Meal Plan</h1>
        <p>Enter meal plan details</p>
      </div>
    </div>

    <section class="card">
      <h3 class="section-title">Meal Plan Information</h3>

      <form method="POST" action="">
        {% csrf_token %}

        <div class="form-grid">

          <div class="field">
            <label>Meal Plan Name <span class="req">*</span></label>
            <input
              class="input"
              type="text"
              name="name"
              placeholder="e.g., EP (European Plan), CP, MAP, AP"
              required
              value="{{ form.name.value|default_if_none:'' }}"
            />
          </div>

          <div class="field">
            <label>Description</label>
            <textarea
              class="textarea"
              name="description"
              placeholder="Brief description of what's included in this meal plan"
            >{{ form.description.value|default_if_none:'' }}</textarea>
          </div>

          <div class="meals-block">
            <div class="meals-title">Included Meals</div>

            <div class="meals-grid">

              <label class="meal-option">
                <input type="checkbox" name="included_meals" value="Breakfast">
                <span>Breakfast</span>
              </label>

              <label class="meal-option">
                <input type="checkbox" name="included_meals" value="Lunch">
                <span>Lunch</span>
              </label>

              <label class="meal-option">
                <input type="checkbox" name="included_meals" value="Dinner">
                <span>Dinner</span>
              </label>

              <label class="meal-option">
                <input type="checkbox" name="included_meals" value="Snacks">
                <span>Snacks</span>
              </label>

              <label class="meal-option">
                <input type="checkbox" name="included_meals" value="High Tea">
                <span>High Tea</span>
              </label>

              <label class="meal-option">
                <input type="checkbox" name="included_meals" value="All Meals">
                <span>All Meals</span>
              </label>

            </div>
          </div>

        </div>

        <div class="btn-row">
          <a href="{% url 'sales:meal_list' %}" class="btn">Cancel</a>
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>

      </form>
    </section>

  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const allMealsCheckbox = document.querySelector('input[value="All Meals"]');
      const individualMeals = document.querySelectorAll('input[name="included_meals"]:not([value="All Meals"])');

      // When "All Meals" is clicked
      allMealsCheckbox.addEventListener('change', function() {
        individualMeals.forEach(meal => {
          meal.checked = this.checked;
        });
      });

      // When individual meals are clicked
      individualMeals.forEach(meal => {
        meal.addEventListener('change', function() {
          // If all individual meals are checked, auto-check "All Meals"
          const allChecked = Array.from(individualMeals).every(m => m.checked);
          if (allChecked) {
            allMealsCheckbox.checked = true;
          } else {
            // If any individual meal is unchecked, uncheck "All Meals"
            allMealsCheckbox.checked = false;
          }
        });
      });
    });
  </script>
{% endblock %}
