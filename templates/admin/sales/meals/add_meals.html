{% extends 'admin/sidebar.html' %}
{% load static %}

{% block extra_css %}
<style>
:root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --border:#ececf2;
      --text:#111318;
      --muted:#7a7f8c;
      --input:#f3f4f6;
      --shadow:0 10px 24px rgba(17,19,24,.06);
      --accent:#d4a42f;
      --radius:22px;
      --danger:#e11d48;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:"Poppins",sans-serif}
    body{background:var(--bg);color:var(--text)}

    .main{
      padding:34px 40px 70px;
    }

    .page-top{
      display:flex;
      align-items:flex-start;
      gap:14px;
      margin-bottom:18px;
    }
    .back-btn{
      width:44px;height:44px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      display:grid;
      place-items:center;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(17,19,24,.06);
      text-decoration:none;
    }
    .back-btn svg{width:20px;height:20px}

    .titles h1{
      font-size:40px;
      font-weight:600;
      line-height:1.15;
      margin-top:2px;
    }
    .titles p{
      color:var(--muted);
      font-size:16px;
      margin-top:6px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:22px;
      max-width:1100px;
    }

    .section-title{
      font-size:18px;
      font-weight:600;
      margin:6px 0 16px;
    }

    .form-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:18px;
    }

    .field label{
      display:block;
      font-size:14px;
      font-weight:600;
      margin:0 0 8px;
    }
    .req{
      color:var(--danger);
      margin-left:6px;
      font-weight:700;
    }

    .input, .textarea{
      width:100%;
      border:1px solid var(--border);
      background:var(--input);
      border-radius:14px;
      padding:14px 14px;
      font-size:15px;
      outline:none;
      transition:.2s ease;
    }
    .input:focus, .textarea:focus{
      background:#fff;
      border-color:#d9d9e6;
      box-shadow:0 0 0 4px rgba(212,164,47,.14);
    }
    .textarea{
      min-height:90px;
      resize:vertical;
      padding-top:14px;
      line-height:1.45;
    }

    .meals-block{
      margin-top:2px;
    }
    .meals-title{
      font-size:14px;
      font-weight:600;
      margin:0 0 10px;
    }

    .add-meal-row{
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    .add-meal-input{
      flex:1;
      min-width:240px;
    }

    .add-meal-btn{
      border:none;
      background:var(--accent);
      color:#111;
      font-weight:600;
      border-radius:14px;
      padding:13px 18px;
      cursor:pointer;
      box-shadow:0 10px 18px rgba(212,164,47,.22);
      transition:.2s ease;
    }
    .add-meal-btn:hover{
      transform:translateY(-1px);
    }

    .meal-error{
      display:none;
      color:var(--danger);
      font-size:13px;
      margin-top:-6px;
      margin-bottom:10px;
    }

    .meals-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap:16px;
    }

    .meal-option{
      position:relative;
      border:1px solid var(--border);
      border-radius:16px;
      background:#fff;
      padding:14px 14px;
      display:flex;
      align-items:center;
      gap:12px;
      cursor:pointer;
      transition:.2s ease;
      min-height:54px;
    }
    .meal-option:hover{
      box-shadow:0 10px 22px rgba(17,19,24,.06);
      transform:translateY(-1px);
    }

    .meal-option input{
      width:18px;
      height:18px;
      accent-color:var(--accent);
    }
    .meal-option span{
      font-size:16px;
      font-weight:600;
    }

    .btn-row{
      display:flex;
      justify-content:flex-start;
      gap:14px;
      margin-top:18px;
      padding-top:6px;
    }
    .btn{
      border-radius:14px;
      padding:12px 18px;
      font-weight:600;
      font-size:15px;
      cursor:pointer;
      border:1px solid var(--border);
      background:#fff;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:120px;
    }
    .btn-primary{
      background:var(--accent);
      border-color:transparent;
      color:#111;
      box-shadow:0 10px 18px rgba(212,164,47,.22);
    }
    .btn:active{transform:translateY(1px)}

    .field-err{
      display:none;
      color:var(--danger);
      font-size:12px;
      margin-top:5px;
    }
    .input.invalid, .textarea.invalid{
      border-color:var(--danger) !important;
      background:#fff5f5;
    }

    @media (max-width: 980px){
      .titles h1{font-size:34px}
      .main{padding:26px 18px 60px}
      .meals-grid{grid-template-columns:1fr}
      .card{max-width:100%}
    }
    @media (max-width: 720px){
      .main{margin-left:0}
      .add-meal-row{
        flex-direction:column;
        align-items:stretch;
      }
      .add-meal-btn{
        width:100%;
      }
    }
</style>
{% endblock %}

{% block content %}
<main class="main">

    <div class="page-top">
      <a class="back-btn" href="{% url 'sales:meal_list' %}" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M15 18L9 12L15 6" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>

      <div class="titles">
        <h1>Add New Meal Plan</h1>
        <p>Enter meal plan details</p>
      </div>
    </div>

    <section class="card">
      <h3 class="section-title">Meal Plan Information</h3>

      <form method="POST" action="" id="mealForm" novalidate>
        {% csrf_token %}

        <div class="form-grid">

          <div class="field">
            <label>Meal Plan Name <span class="req">*</span></label>
            <input
              class="input"
              type="text"
              id="meal_name"
              name="name"
              placeholder="e.g., EP (European Plan), CP, MAP, AP"
              value="{{ form.name.value|default_if_none:'' }}"
            />
            <span class="field-err" id="err_meal_name"></span>
          </div>

          <div class="field">
            <label>Description</label>
            <textarea
              class="textarea"
              id="meal_description"
              name="description"
              placeholder="Brief description of what's included in this meal plan"
            >{{ form.description.value|default_if_none:'' }}</textarea>
            <span class="field-err" id="err_meal_description"></span>
          </div>

          <div class="meals-block">
            <div class="meals-title">Included Meals</div>

            <div class="add-meal-row">
              <input
                type="text"
                id="newMealItem"
                class="input add-meal-input"
                placeholder="Enter new meal item"
              />
              <button type="button" id="addMealBtn" class="add-meal-btn">Add Item</button>
            </div>

            <div id="mealError" class="meal-error">Please enter a valid unique meal item.</div>

            <div class="meals-grid" id="mealsGrid">

              <label class="meal-option">
                <input type="checkbox" name="included_meals" value="Breakfast">
                <span>Breakfast</span>
              </label>

              <label class="meal-option">
                <input type="checkbox" name="included_meals" value="Lunch">
                <span>Lunch</span>
              </label>

              <label class="meal-option">
                <input type="checkbox" name="included_meals" value="Dinner">
                <span>Dinner</span>
              </label>

              <label class="meal-option">
                <input type="checkbox" name="included_meals" value="Snacks">
                <span>Snacks</span>
              </label>

              <label class="meal-option">
                <input type="checkbox" name="included_meals" value="High Tea">
                <span>High Tea</span>
              </label>

              <label class="meal-option">
                <input type="checkbox" name="included_meals" value="All Meals">
                <span>All Meals</span>
              </label>

            </div>
          </div>

        </div>

        <div class="btn-row">
          <a href="{% url 'sales:meal_list' %}" class="btn">Cancel</a>
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>

      </form>
    </section>

  </main>

  <script>
    function showErr(id, msg) {
      const el = document.getElementById('err_' + id);
      const inp = document.getElementById(id);
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
      inp.classList.toggle('invalid', !!msg);
    }

    // AJAX duplicate check + letters-only for meal plan name
    let dupTimer = null;
    let mealNameDuplicate = false;
    document.getElementById('meal_name').addEventListener('input', function() {
      mealNameDuplicate = false;
      clearTimeout(dupTimer);
      const val = this.value.trim();
      if (!val) { showErr('meal_name', ''); return; }
      if (/[0-9]/.test(val)) { showErr('meal_name', 'Meal Plan Name must not contain numbers.'); return; }
      if (/[^A-Za-z\s]/.test(val)) { showErr('meal_name', 'Meal Plan Name must contain letters only.'); return; }
      showErr('meal_name', '');
      dupTimer = setTimeout(() => {
        fetch('{% url "sales:check_meal_name" %}?name=' + encodeURIComponent(val))
          .then(r => r.json())
          .then(data => {
            mealNameDuplicate = data.exists;
            showErr('meal_name', data.exists ? 'This meal plan name already exists.' : '');
          });
      }, 400);
    });

    // Description: letters, numbers, spaces, . ! ,
    document.getElementById('meal_description').addEventListener('input', function() {
      const val = this.value.trim();
      if (!val) { showErr('meal_description', ''); return; }
      if (!/^[A-Za-z0-9\s.,!&]+$/.test(val))
        showErr('meal_description', 'Description may only contain letters, numbers, spaces, . , ! &');
      else showErr('meal_description', '');
    });

    document.getElementById('mealForm').addEventListener('submit', function(e) {
      let valid = true;

      const name = document.getElementById('meal_name').value.trim();
      if (!name) { showErr('meal_name', 'Meal Plan Name is required.'); valid = false; }
      else if (/[0-9]/.test(name)) { showErr('meal_name', 'Meal Plan Name must not contain numbers.'); valid = false; }
      else if (/[^A-Za-z\s]/.test(name)) { showErr('meal_name', 'Meal Plan Name must contain letters only.'); valid = false; }
      else if (mealNameDuplicate) { showErr('meal_name', 'This meal plan name already exists.'); valid = false; }

      const desc = document.getElementById('meal_description').value.trim();
      if (desc && !/^[A-Za-z0-9\s.,!&]+$/.test(desc)) {
        showErr('meal_description', 'Description may only contain letters, numbers, spaces, . , ! &');
        valid = false;
      }

      if (!valid) e.preventDefault();
    });

    document.addEventListener('DOMContentLoaded', function() {
      const mealsGrid = document.getElementById('mealsGrid');
      const allMealsCheckbox = document.querySelector('input[value="All Meals"]');
      const addMealBtn = document.getElementById('addMealBtn');
      const newMealInput = document.getElementById('newMealItem');
      const mealError = document.getElementById('mealError');

      function getIndividualMeals() {
        return document.querySelectorAll('input[name="included_meals"]:not([value="All Meals"])');
      }

      function syncAllMealsState() {
        const individualMeals = Array.from(getIndividualMeals());
        const allChecked = individualMeals.length > 0 && individualMeals.every(meal => meal.checked);
        allMealsCheckbox.checked = allChecked;
      }

      function bindIndividualMealEvents(checkbox) {
        checkbox.addEventListener('change', function() {
          syncAllMealsState();
        });
      }

      function bindAllExistingIndividualMeals() {
        getIndividualMeals().forEach(meal => {
          if (!meal.dataset.bound) {
            bindIndividualMealEvents(meal);
            meal.dataset.bound = 'true';
          }
        });
      }

      allMealsCheckbox.addEventListener('change', function() {
        getIndividualMeals().forEach(meal => {
          meal.checked = this.checked;
        });
      });

      bindAllExistingIndividualMeals();

      function showMealError(message) {
        mealError.textContent = message;
        mealError.style.display = 'block';
      }

      function hideMealError() {
        mealError.style.display = 'none';
      }

      function mealAlreadyExists(name) {
        const allMealInputs = document.querySelectorAll('input[name="included_meals"]');
        return Array.from(allMealInputs).some(item =>
          item.value.trim().toLowerCase() === name.trim().toLowerCase()
        );
      }

      function createMealOption(mealName) {
        const label = document.createElement('label');
        label.className = 'meal-option';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.name = 'included_meals';
        checkbox.value = mealName;

        const span = document.createElement('span');
        span.textContent = mealName;

        label.appendChild(checkbox);
        label.appendChild(span);

        mealsGrid.insertBefore(label, allMealsCheckbox.closest('.meal-option'));

        bindIndividualMealEvents(checkbox);

        if (allMealsCheckbox.checked) {
          checkbox.checked = true;
        }

        syncAllMealsState();
      }

      addMealBtn.addEventListener('click', function() {
        const mealName = newMealInput.value.trim();

        if (!mealName) {
          showMealError('Please enter a meal item name.');
          return;
        }

        if (mealAlreadyExists(mealName)) {
          showMealError('This meal item already exists.');
          return;
        }

        createMealOption(mealName);
        newMealInput.value = '';
        hideMealError();
        newMealInput.focus();
      });

      newMealInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          addMealBtn.click();
        }
      });

      newMealInput.addEventListener('input', function() {
        if (this.value.trim()) {
          hideMealError();
        }
      });
    });
  </script>
{% endblock %}
