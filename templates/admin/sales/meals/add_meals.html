{% extends 'admin/sidebar.html' %}
{% load static %}

{% block extra_css %}
<style>
:root{
  --bg:#f7f7fa;
  --card:#ffffff;
  --border:#e7e7ee;
  --text:#111;
  --muted:#7b8190;
  --input:#f3f4f7;
  --accent:#d4a63a;
  --radius:20px;
  --shadow:0 10px 24px rgba(0,0,0,0.05);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins", sans-serif;
}

body{
  background:var(--bg);
}

.main{
  padding:30px 40px;
}

/* HEADER */
.page-top{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:25px;
}

.back-btn{
  width:50px;
  height:50px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
}

.titles h1{
  font-size:28px;
  font-weight:600;
}

.titles p{
  color:var(--muted);
  font-size:14px;
}

/* CARD */
.card{
  background:#fff;
  padding:30px;
  border-radius:20px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  max-width:900px;
}

.section-title{
  font-size:18px;
  font-weight:600;
  margin-bottom:25px;
}

/* FORM */
.form-group{
  margin-bottom:20px;
}

.form-group label{
  font-weight:600;
  font-size:14px;
  margin-bottom:8px;
  display:block;
}

.req{
  color:red;
}

.input, .textarea{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:var(--input);
  font-size:14px;
  outline:none;
}

.textarea{
  min-height:90px;
  resize:none;
}

/* MEALS GRID */
.meal-title{
  font-weight:600;
  margin-bottom:15px;
}

.meal-grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:18px;
}

.meal-option{
  display:flex;
  align-items:center;
  gap:12px;
  padding:18px;
  border:1px solid #dcdfe6;
  border-radius:16px;
  background:#fff;
  cursor:pointer;
  transition:0.2s;
}

.meal-option:hover{
  box-shadow:0 6px 16px rgba(0,0,0,0.05);
}

.meal-option input{
  width:22px;
  height:22px;
  accent-color:var(--accent);
}

.meal-option span{
  font-size:16px;
  font-weight:600;
}

/* BUTTONS */
.btn-row{
  margin-top:25px;
  display:flex;
  gap:15px;
}

.btn{
  padding:12px 25px;
  border-radius:12px;
  border:1px solid var(--border);
  background:#fff;
  cursor:pointer;
}

.btn-primary{
  background:var(--accent);
  border:none;
  font-weight:600;
}

/* MOBILE */
@media(max-width:768px){
  .meal-grid{
    grid-template-columns:1fr;
  }
}
</style>
{% endblock %}


{% block content %}
<main class="main">

  <!-- HEADER -->
  <div class="page-top">
    <a href="{% url 'sales:meal_list' %}" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="#1a1d24" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div class="titles">
      <h1>Add New Meal Plan</h1>
      <p>Enter meal plan details</p>
    </div>
  </div>

  <!-- CARD -->
  <div class="card">
    <div class="section-title">Meal Plan Information</div>

    <form method="POST">
      {% csrf_token %}

      <!-- NAME -->
      <div class="form-group">
        <label>Meal Plan Name <span class="req">*</span></label>
        <input type="text" name="name" class="input"
               placeholder="e.g., EP (European Plan), CP, MAP, AP">
      </div>

      <!-- DESCRIPTION -->
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" class="textarea"
          placeholder="Brief description of what's included in this meal plan"></textarea>
      </div>

      <!-- INCLUDED MEALS -->
      <div class="form-group">
        <div class="meal-title">Included Meals</div>

        <!-- ADD CUSTOM MEAL -->
        <div style="display:flex;gap:10px;margin-bottom:18px;align-items:center;">
          <input type="text" id="new-meal-input" class="input" placeholder="e.g., Early Morning Tea" style="max-width:320px;">
          <button type="button" onclick="addCustomMeal()" class="btn btn-primary" style="white-space:nowrap;">+ Add Meal</button>
        </div>

        <div class="meal-grid">

          <label class="meal-option">
            <input type="checkbox" name="included_meals" value="Breakfast">
            <span>Breakfast</span>
          </label>

          <label class="meal-option">
            <input type="checkbox" name="included_meals" value="Lunch">
            <span>Lunch</span>
          </label>

          <label class="meal-option">
            <input type="checkbox" name="included_meals" value="Dinner">
            <span>Dinner</span>
          </label>

          <label class="meal-option">
            <input type="checkbox" name="included_meals" value="Snacks">
            <span>Snacks</span>
          </label>

          <label class="meal-option">
            <input type="checkbox" name="included_meals" value="High Tea">
            <span>High Tea</span>
          </label>

          <label class="meal-option">
            <input type="checkbox" name="included_meals" value="All Meals">
            <span>All Meals</span>
          </label>

        </div>
      </div>

      <!-- BUTTONS -->
      <div class="btn-row">
        <button type="button" class="btn">Cancel</button>
        <button type="submit" class="btn btn-primary">Submit</button>
      </div>

    </form>
  </div>

</main>

<script>
  function addCustomMeal() {
    const input = document.getElementById('new-meal-input');
    const val = input.value.trim();
    if (!val) return;
    const grid = document.querySelector('.meal-grid');
    const label = document.createElement('label');
    label.className = 'meal-option';
    label.innerHTML = `
      <input type="checkbox" name="included_meals" value="${val}" checked style="width:22px;height:22px;accent-color:var(--accent);">
      <span style="font-size:16px;font-weight:600;">${val}</span>
    `;
    grid.appendChild(label);
    input.value = '';
    input.focus();
  }

  document.getElementById('new-meal-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addCustomMeal(); }
  });
</script>
{% endblock %}
