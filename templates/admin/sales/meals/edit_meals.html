{% include "admin/header.html" %}
{% include "admin/sidebar.html" %}

<div class="main">
  <div class="content-section">
    <h2>Edit Meal</h2>

    {% if error %}
      <div class="alert alert-danger" style="margin-bottom: 15px;">{{ error }}</div>
    {% endif %}

    <form method="POST" style="max-width: 600px;">
      {% csrf_token %}
      <div class="form-group" style="margin-bottom: 15px;">
        <label for="meal_name" style="display: block; margin-bottom: 5px; font-weight: bold;">Meal Name</label>
        <input type="text" id="meal_name" name="meal_name" value="{{ meal.meal_name }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div class="form-group" style="margin-bottom: 15px;">
        <label for="price" style="display: block; margin-bottom: 5px; font-weight: bold;">Price</label>
        <input type="number" id="price" name="price" step="0.01" value="{{ meal.price }}" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
      </div>

      <div class="form-group" style="margin-bottom: 15px;">
        <label for="description" style="display: block; margin-bottom: 5px; font-weight: bold;">Description</label>
        <textarea id="description" name="description" rows="4" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">{{ meal.description }}</textarea>
      </div>

      <div class="form-group" style="margin-bottom: 15px;">
        <label for="status" style="display: block; margin-bottom: 5px; font-weight: bold;">Status</label>
        <select id="status" name="status" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
          <option value="Available" {% if meal.status == 'Available' %}selected{% endif %}>Available</option>
          <option value="Unavailable" {% if meal.status == 'Unavailable' %}selected{% endif %}>Unavailable</option>
        </select>
      </div>

      <div style="display: flex; gap: 10px;">
        <button type="submit" class="btn btn-success">Update Meal</button>
        <a href="{% url 'sales:meal_list' %}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
