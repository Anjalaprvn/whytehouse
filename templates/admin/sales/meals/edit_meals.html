{% extends 'admin/sidebar.html' %}
{% load static %}

{% block extra_css %}
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

  body { background: #f5f5f5; color: #111; }

  .main { padding: 30px 40px; }

  .page-top { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }

  .back-btn {
    width: 50px; height: 50px; border-radius: 12px;
    border: 1px solid #e7e7ee; background: #fff;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
  }

  .back-btn svg { width: 20px; height: 20px; }

  .titles h1 { font-size: 28px; font-weight: 600; }
  .titles p { color: #7b8190; font-size: 14px; }

  .card {
    background: #fff; padding: 30px; border-radius: 20px;
    border: 1px solid #e7e7ee; max-width: 900px;
  }

  .section-title { font-size: 18px; font-weight: 600; margin-bottom: 25px; }

  .form-group { margin-bottom: 20px; }

  .form-group label { font-weight: 600; font-size: 14px; margin-bottom: 8px; display: block; }

  .req { color: #e11d48; }

  .input, .textarea {
    width: 100%; padding: 14px; border-radius: 12px;
    border: none; background: #f3f4f7; font-size: 14px; outline: none;
    font-family: Arial, sans-serif;
  }

  .textarea { min-height: 90px; resize: none; }

  .meal-title { font-weight: 600; margin-bottom: 8px; font-size: 14px; }

  .add-meal-row {
    display: flex; gap: 10px; align-items: center; margin-bottom: 18px;
  }

  .add-meal-row .input { max-width: 320px; }

  .add-meal-btn {
    background: #d4a63a; color: #000; border: none;
    border-radius: 12px; padding: 13px 20px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
  }

  .meal-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px;
  }

  .meal-option {
    display: flex; align-items: center; gap: 12px;
    padding: 18px; border: 1px solid #dcdfe6;
    border-radius: 16px; background: #fff; cursor: pointer; transition: 0.2s;
  }

  .meal-option:hover { box-shadow: 0 6px 16px rgba(0,0,0,0.05); }

  .meal-option input {
    width: 22px; height: 22px; accent-color: #d4a63a;
    flex-shrink: 0; margin: 0;
  }

  .meal-option span { font-size: 16px; font-weight: 600; line-height: 1; }

  .btn-row { margin-top: 25px; display: flex; gap: 15px; }

  .btn {
    padding: 12px 25px; border-radius: 12px;
    border: 1px solid #e7e7ee; background: #fff; cursor: pointer;
    font-size: 14px; font-weight: 600; text-decoration: none;
    display: inline-flex; align-items: center; justify-content: center;
  }

  .btn-primary { background: #d4a63a; border: none; }

  @media (max-width: 768px) {
    .meal-grid { grid-template-columns: 1fr; }
    .add-meal-row { flex-wrap: wrap; }
    .add-meal-row .input { max-width: 100%; }
  }
</style>
{% endblock %}

{% block content %}
<main class="main">

  <div class="page-top">
    <a href="{% url 'sales:meal_list' %}" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div class="titles">
      <h1>Edit Meal Plan</h1>
      <p>Update meal plan details</p>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Meal Plan Information</div>

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label>Meal Plan Name <span class="req">*</span></label>
        <input type="text" name="name" class="input"
               placeholder="e.g., EP (European Plan), CP, MAP, AP"
               value="{{ meal.name|default:'' }}">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea name="description" class="textarea"
          placeholder="Brief description of what's included in this meal plan">{{ meal.description|default:'' }}</textarea>
      </div>

      <div class="form-group">
        <div class="meal-title">Included Meals</div>

        <div class="add-meal-row">
          <input type="text" id="new-meal-input" class="input" placeholder="e.g., Early Morning Tea">
          <button type="button" onclick="addCustomMeal()" class="add-meal-btn">+ Add Meal</button>
        </div>

        <div class="meal-grid" id="meal-grid">
          <label class="meal-option">
            <input type="checkbox" name="included_meals" value="Breakfast" {% if 'Breakfast' in meal.included_meals_list %}checked{% endif %}>
            <span>Breakfast</span>
          </label>
          <label class="meal-option">
            <input type="checkbox" name="included_meals" value="Lunch" {% if 'Lunch' in meal.included_meals_list %}checked{% endif %}>
            <span>Lunch</span>
          </label>
          <label class="meal-option">
            <input type="checkbox" name="included_meals" value="Dinner" {% if 'Dinner' in meal.included_meals_list %}checked{% endif %}>
            <span>Dinner</span>
          </label>
          <label class="meal-option">
            <input type="checkbox" name="included_meals" value="Snacks" {% if 'Snacks' in meal.included_meals_list %}checked{% endif %}>
            <span>Snacks</span>
          </label>
          <label class="meal-option">
            <input type="checkbox" name="included_meals" value="High Tea" {% if 'High Tea' in meal.included_meals_list %}checked{% endif %}>
            <span>High Tea</span>
          </label>
          <label class="meal-option">
            <input type="checkbox" name="included_meals" value="All Meals" {% if 'All Meals' in meal.included_meals_list %}checked{% endif %}>
            <span>All Meals</span>
          </label>
          {% for item in extra_meals %}
          <label class="meal-option">
            <input type="checkbox" name="included_meals" value="{{ item }}" checked>
            <span>{{ item }}</span>
          </label>
          {% endfor %}
        </div>
      </div>

      <div class="btn-row">
        <a href="{% url 'sales:meal_list' %}" class="btn">Cancel</a>
        <button type="submit" class="btn btn-primary">Update</button>
      </div>
    </form>
  </div>

</main>

<script>
  function addCustomMeal() {
    const input = document.getElementById('new-meal-input');
    const val = input.value.trim();
    if (!val) return;
    const grid = document.getElementById('meal-grid');
    const label = document.createElement('label');
    label.className = 'meal-option';
    label.innerHTML = `
      <input type="checkbox" name="included_meals" value="${val}" checked style="width:22px;height:22px;accent-color:#d4a63a;flex-shrink:0;margin:0;">
      <span style="font-size:16px;font-weight:600;line-height:1;">${val}</span>
    `;
    grid.appendChild(label);
    input.value = '';
    input.focus();
  }

  document.getElementById('new-meal-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addCustomMeal(); }
  });
</script>
{% endblock %}
