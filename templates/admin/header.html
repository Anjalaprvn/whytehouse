{% load static %}
<!-- header.html -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --sidebarW:280px;              /* keep same as your sidebar width */
    --hdrH:76px;
    --dark1:#0f0f10;
    --dark2:#1a1a1b;
    --text:#111318;
    --muted:#7a7f8c;
    --border:#e9eaef;
  }

  *{box-sizing:border-box}

  /* Sticky top header bar */
  .app-header{
    position:sticky;
    top:0;
    z-index:50;
    display:flex;
    width:100%;
    height:var(--hdrH);
    background:#fff;
    border-bottom:1px solid var(--border);
  }

  /* Left black brand strip */
  .brand-strip{
    width:var(--sidebarW);
    height:100%;
    background:linear-gradient(180deg, var(--dark1), var(--dark2));
    display:flex;
    align-items:center;
    justify-content:center; /* logo centered like screenshot */
    padding:0 18px;
    transition:0.3s ease;
  }
  .brand-strip img{
    height:38px;  /* adjust if your logo is bigger */
    width:auto;
    display:block;
  }

  /* Right white header area */
  .header-bar{
    flex:1;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:space-between; /* hamburger left, date right */
    padding:0 44px 0 34px;
    background:#fff;
  }

  .menu-btn{
    width:44px;
    height:44px;
    border-radius:14px;
    border:1px solid transparent;
    background:transparent;
    display:grid;
    place-items:center;
    cursor:pointer;
  }
  .menu-btn svg{width:22px;height:22px}

  .header-date{
    font-family:"Poppins",sans-serif;
    font-size:15px;
    font-weight:400;
    color:var(--muted);
    white-space:nowrap;
  }

  /* Collapsed brand-strip */
  body.sidebar-collapsed .brand-strip{
    width:70px;
  }

  /* Mobile: remove left strip width */
  @media (max-width:720px){
    .brand-strip{width:76px; justify-content:center}
    .brand-strip img{height:32px}
    .header-bar{padding:0 18px}
  }
</style>

<header class="app-header">
  <!-- Left brand strip -->
  <div class="brand-strip">
    <!-- put your logo path here -->
    <img src="{% static 'img/whytehouse-logo.png' %}" alt="Whyte House">
  </div>

  <!-- Right header -->
  <div class="header-bar">
    <button class="menu-btn" type="button" aria-label="Menu" onclick="document.getElementById('toggle-sidebar').checked = !document.getElementById('toggle-sidebar').checked; document.body.classList.toggle('sidebar-collapsed');">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 7H20" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M4 12H20" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M4 17H20" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="header-date">
      {% if today %}{{ today|date:"l, F d, Y" }}{% else %}Monday, February 23, 2026{% endif %}
    </div>
  </div>
</header>
