{% load static %}
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --hdrH:76px;
    --text:#111318;
    --muted:#7a7f8c;
    --border:#e9eaef;
    --header-bg:#ffffff;
  }

  *{
    box-sizing:border-box;
  }

  .header-section{
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    height: var(--hdrH);
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    padding: 0 34px;
    flex-shrink: 0;
  }

  .menu-btn{
    width: 44px;
    height: 44px;
    border-radius: 14px;
    border: 1px solid transparent;
    background: transparent;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .menu-btn:hover{
    background: #f6f6f7;
  }

  .menu-btn svg{
    width: 22px;
    height: 22px;
  }

  .header-date{
    font-family: "Poppins", sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--muted);
    white-space: nowrap;
  }

  @media (max-width:720px){
    .header-section{
      padding: 0 18px;
    }

    .header-date{
      font-size: 13px;
    }
  }
</style>

<header class="header-section">
  <label for="toggle-sidebar" class="menu-btn" aria-label="Menu">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M4 7H20" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M4 12H20" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M4 17H20" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
  </label>

  <div class="header-date">
    {% if today %}{{ today|date:"l, F d, Y" }}{% else %}Monday, February 23, 2026{% endif %}
  </div>
</header>
