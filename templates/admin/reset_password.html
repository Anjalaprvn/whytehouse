{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Whyte House</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #fcfbf7; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .reset-card {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #888;
            font-size: 13px;
            display: flex;
            align-items: center; gap: 5px;
        }

        .logo { width: 40px; margin-bottom: 15px; margin-top: 10px; }
        h2 { font-size: 20px; font-weight: 600; color: #333; margin-bottom: 5px; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 25px; }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #f0f0f0;
            background-color: #f9f9f9;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: #DB902B;
            background-color: #fff;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #DB902B;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #c9801f;
        }

        .back-text {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }

        .back-text a { 
            color: #DB902B; 
            text-decoration: none; 
            font-weight: 600; 
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .success-message {
            background: #efe;
            color: #363;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <a href="{% url 'admin_panel:forgot_password' %}" class="back-link">← Back</a>
        
        <img src="{% static 'img/whytehouse-logo.png' %}" alt="Logo" class="logo">
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your new password</p>

        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-message{% else %}success-message{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="Enter new password" required>
                <div class="password-requirements">Password must be at least 6 characters long</div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required>
            </div>

            <button type="submit" class="submit-btn">Reset Password</button>
        </form>

        <p class="back-text">Remember your password? <a href="{% url 'admin_panel:login' %}">Sign In</a></p>
    </div>

    <script>
        // Password confirmation validation
        document.getElementById('confirm_password').addEventListener('input', function() {
            const password = document.getElementById('new_password').value;
            const confirmPassword = this.value;
            
            if (confirmPassword && password !== confirmPassword) {
                this.style.borderColor = '#dc2626';
            } else {
                this.style.borderColor = '#f0f0f0';
            }
        });
    </script>
</body>
</html>
