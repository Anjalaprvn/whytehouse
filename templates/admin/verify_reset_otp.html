{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Verify OTP | Whyte House</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #fcfbf7; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .otp-card {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #888;
            font-size: 13px;
            display: flex;
            align-items: center; gap: 5px;
        }

        .logo { width: 40px; margin-bottom: 15px; margin-top: 10px; }
        h2 { font-size: 20px; font-weight: 600; color: #333; margin-bottom: 5px; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 25px; }

        .otp-inputs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .otp-field {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            border: 1px solid #f0f0f0;
            background-color: #f9f9f9;
            border-radius: 8px;
            outline: none;
        }

        .otp-field:focus { border-color: #DB902B; }

        .verify-btn {
            width: 100%;
            padding: 14px;
            background-color: #DB902B;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .verify-btn:hover {
            background-color: #c9801f;
        }

        .resend-text {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }

        .resend-link { color: #DB902B; text-decoration: none; font-weight: 600; }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .success-message {
            background: #efe;
            color: #363;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="otp-card">
        <a href="{% url 'admin_panel:forgot_password' %}" class="back-link">← Back</a>
        
        <img src="{% static 'images/logo.png' %}" alt="Logo" class="logo">
        <h2>Enter OTP</h2>
        <p class="subtitle">We've sent a code to {{ email }}</p>

        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-message{% else %}success-message{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" id="otpForm">
            {% csrf_token %}
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-field" required>
                <input type="text" maxlength="1" class="otp-field" required>
                <input type="text" maxlength="1" class="otp-field" required>
                <input type="text" maxlength="1" class="otp-field" required>
                <input type="text" maxlength="1" class="otp-field" required>
                <input type="text" maxlength="1" class="otp-field" required>
            </div>
            <input type="hidden" name="otp" id="otpValue">

            <button type="submit" class="verify-btn">Verify & Continue</button>
        </form>

        <p class="resend-text">Didn't receive code? <a href="{% url 'admin_panel:forgot_password' %}" class="resend-link">Resend</a></p>
    </div>

    <script>
        // Handle OTP input
        const inputs = document.querySelectorAll('.otp-field');
        const otpValue = document.getElementById('otpValue');
        const form = document.getElementById('otpForm');
        
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                
                // Update hidden field with combined OTP
                let otp = '';
                inputs.forEach(inp => otp += inp.value);
                otpValue.value = otp;
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
        
        // Ensure OTP value is set before form submission
        form.addEventListener('submit', (e) => {
            let otp = '';
            inputs.forEach(inp => otp += inp.value);
            otpValue.value = otp;
            
            if (otp.length !== 6) {
                e.preventDefault();
                alert('Please enter all 6 digits of the OTP');
            }
        });
    </script>
</body>
</html>
