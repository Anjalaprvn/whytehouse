{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Whyte House</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #fcfbf7; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .forgot-card {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #888;
            font-size: 13px;
            display: flex;
            align-items: center; gap: 5px;
        }

        .logo { width: 40px; margin-bottom: 15px; margin-top: 10px; }
        h2 { font-size: 20px; font-weight: 600; color: #333; margin-bottom: 5px; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 25px; }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #f0f0f0;
            background-color: #f9f9f9;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: #DB902B;
            background-color: #fff;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #DB902B;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #c9801f;
        }

        .back-text {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }

        .back-text a { 
            color: #DB902B; 
            text-decoration: none; 
            font-weight: 600; 
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .success-message {
            background: #efe;
            color: #363;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="forgot-card">
        <a href="{% url 'admin_panel:login' %}" class="back-link">← Back to Login</a>
        
        <img src="{% static 'img/whytehouse-logo.png' %}" alt="Logo" class="logo">
        <h2>Forgot Password</h2>
        <p class="subtitle">Enter your email to reset your password</p>

        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-message{% else %}success-message{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <button type="submit" class="submit-btn">Send Reset Link</button>
        </form>

        <p class="back-text">Remember your password? <a href="{% url 'admin_panel:login' %}">Sign In</a></p>
    </div>

</body>
</html>
