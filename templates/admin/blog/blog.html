{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog Management | Whyte House</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --border:#ececf2;
      --text:#111318;
      --muted:#7a7f8c;
      --input:#f3f4f6;
      --shadow:0 10px 24px rgba(17,19,24,.06);
      --accent:#d4a42f;
      --danger:#e11d48;
    }

    *{box-sizing:border-box;margin:0;padding:0;font-family:"Poppins",sans-serif}
    body{background:var(--bg);color:var(--text)}

    .main{
      margin-left:280px;
      padding:30px 40px 70px;
    }

    .page-title{
      font-size:40px;
      font-weight:600;
      margin-bottom:6px;
    }
    .page-sub{
      color:var(--muted);
      font-size:15px;
      margin-bottom:22px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:22px;
    }

    .card-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:6px 6px 16px;
    }
    .card-head h3{
      font-size:20px;
      font-weight:600;
    }

    .tools{
      display:flex;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .search{
      position:relative;
      min-width:320px;
      max-width:420px;
      flex:1;
    }
    .search input{
      width:100%;
      border:1px solid transparent;
      background:var(--input);
      border-radius:14px;
      padding:13px 14px 13px 46px;
      outline:none;
      font-size:14px;
      transition:.2s ease;
    }
    .search input:focus{
      background:#fff;
      border-color:#d9dbe4;
      box-shadow:0 0 0 4px rgba(212,164,47,.12);
    }
    .search svg{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      width:18px;height:18px;
      opacity:.65;
    }

    .btn-add{
      display:inline-flex;
      align-items:center;
      gap:10px;
      background:var(--accent);
      color:#111;
      border:none;
      border-radius:14px;
      padding:12px 18px;
      font-weight:600;
      cursor:pointer;
      box-shadow:0 10px 18px rgba(212,164,47,.22);
      white-space:nowrap;
      text-decoration:none;
    }
    .btn-add svg{width:18px;height:18px}

    .table-wrap{
      margin-top:14px;
      border-radius:18px;
      overflow:hidden;
      border:1px solid var(--border);
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
    }

    thead th{
      text-align:left;
      font-size:14px;
      font-weight:600;
      padding:18px 22px;
      border-bottom:1px solid var(--border);
      white-space:nowrap;
    }

    tbody td{
      padding:18px 22px;
      font-size:15px;
      border-bottom:1px solid var(--border);
      vertical-align:middle;
    }

    .sl{width:90px}

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .icon-btn{
      width:42px;height:40px;
      border-radius:12px;
      border:1px solid #e7e7ee;
      background:#fff;
      display:grid;
      place-items:center;
      cursor:pointer;
    }
    .icon-btn svg{width:18px;height:18px}
    .icon-btn.delete svg{stroke:var(--danger)}

    .help-fab{
      position:fixed;
      right:18px;
      bottom:18px;
      width:44px;height:44px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      display:grid;
      place-items:center;
      box-shadow:0 14px 26px rgba(0,0,0,.10);
      cursor:pointer;
    }
    .help-fab span{font-weight:700;color:#2a2d36}

    @media (max-width: 900px){
      .page-title{font-size:34px}
      .search{min-width:240px}
    }
    @media (max-width: 720px){
      .main{margin-left:0}
    }
  </style>
</head>
<body>

  {% include "admin/header.html" %}
  {% include "admin/sidebar.html" %}

  <main class="main">
    <h1 class="page-title">Blog Management</h1>
    <p class="page-sub">Manage blog posts and articles</p>

    <section class="card">
      <div class="card-head">
        <h3>Blog Posts</h3>

        <div class="tools">
          <div class="search">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M21 21L16.6 16.6" stroke="#111" stroke-width="2.2" stroke-linecap="round"/>
              <path d="M10.8 18.2C14.887 18.2 18.2 14.887 18.2 10.8C18.2 6.713 14.887 3.4 10.8 3.4C6.713 3.4 3.4 6.713 3.4 10.8C3.4 14.887 6.713 18.2 10.8 18.2Z" stroke="#111" stroke-width="2.2"/>
            </svg>
            <input type="text" placeholder="Search blogs..." />
          </div>

          <a href="#" class="btn-add">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 5V19" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
              <path d="M5 12H19" stroke="#111" stroke-width="2.4" stroke-linecap="round"/>
            </svg>
            Add Blog
          </a>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="sl">Sl No</th>
              <th>Title</th>
              <th>Author</th>
              <th>Date</th>
              <th>Status</th>
              <th style="min-width:160px;">Actions</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td colspan="6" style="text-align: center; padding: 40px;">
                No blogs found. <a href="#" style="color: var(--accent); text-decoration: none;">Add your first blog</a>.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <button class="help-fab"><span>?</span></button>

</body>
</html>
