{% extends "admin/sidebar.html" %}
{% load static %}

{% block extra_css %}
<style>
  :root{
    --bg:#f5f7fb;
    --card:#ffffff;
    --text:#0f172a;
    --muted:#64748b;
    --line:#e9eef6;
    --input:#f3f4f6;
    --btn:#d7aa3c;
    --btnHover:#c99722;
    --radius:18px;
  }

  .page-title{font-size:28px;font-weight:700;margin-bottom:6px;color:var(--text)}
  .page-sub{color:var(--muted);margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{display:flex;flex-direction:column;gap:6px}
  label{font-size:13px;color:var(--muted);font-weight:600}
  input, textarea, select{
    width:100%;
    padding:12px 12px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--input);
    outline:none;
  }
  textarea{min-height:160px;resize:vertical;background:#fff}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:16px}
  .btn{padding:10px 16px;border-radius:12px;border:0;cursor:pointer;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
  .btn-primary{background:var(--btn);color:#000}
  .btn-primary:hover{background:var(--btnHover)}
  .btn-secondary{background:#fff;border:1px solid var(--line);color:var(--text)}
  @media (max-width: 900px){
    .grid{grid-template-columns:1fr}
  }
</style>
{% endblock %}

{% block content %}
<div class="main">
  <div class="page">
    <div class="card">
      <div class="page-title">Edit Blog</div>
      <div class="page-sub">Update blog details and save changes.</div>

      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="grid">
          <div class="field">
            <label>Title</label>
            <input type="text" name="title" value="{{ blog.title }}" required>
          </div>

          <div class="field">
            <label>Status</label>
            <select name="status">
              <option value="draft" {% if blog.status == "draft" %}selected{% endif %}>Draft</option>
              <option value="published" {% if blog.status == "published" %}selected{% endif %}>Published</option>
              <option value="scheduled" {% if blog.status == "scheduled" %}selected{% endif %}>Scheduled</option>
            </select>
          </div>

          <div class="field">
            <label>Author Name</label>
            <input type="text" name="author_name" value="{{ blog.author_name }}">
          </div>

          <div class="field">
            <label>Publish Date</label>
            <input type="date" name="publish_date" value="{{ blog.publish_date|date:'Y-m-d' }}">
          </div>

          <div class="field">
            <label>Reading Time (minutes)</label>
            <input type="number" name="reading_time" min="1" value="{{ blog.reading_time }}">
          </div>

          <div class="field">
            <label>Featured Image</label>
            <input type="file" name="featured_image" accept="image/*">
          </div>
        </div>

        <div class="field" style="margin-top:14px">
          <label>Excerpt</label>
          <textarea name="excerpt">{{ blog.excerpt }}</textarea>
        </div>

        <div class="field" style="margin-top:14px">
          <label>Author Summary</label>
          <textarea name="author_summary">{{ blog.author_summary }}</textarea>
        </div>

        <div class="field" style="margin-top:14px">
          <label>Content</label>
          <textarea name="content" required>{{ blog.content }}</textarea>
        </div>

        <div class="row">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{% url 'blog:blog_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
