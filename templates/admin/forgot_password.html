{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | Whyte House</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #fcfbf7; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .otp-card {
            background: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #888;
            font-size: 13px;
            display: flex;
            align-items: center; gap: 5px;
        }

        .logo { width: 40px; margin-bottom: 15px; margin-top: 10px; }
        h2 { font-size: 20px; font-weight: 600; color: #333; margin-bottom: 5px; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 25px; }

        .otp-inputs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .otp-field {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            border: 1px solid #f0f0f0;
            background-color: #f9f9f9;
            border-radius: 8px;
            outline: none;
        }

        .otp-field:focus { border-color: #DB902B; }

        .verify-btn {
            width: 100%;
            padding: 14px;
            background-color: #DB902B;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .resend-text {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }

        .resend-link { color: #DB902B; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="otp-card">
        <a href="{% url 'forgot_password' %}" class="back-link"> ← Back</a>
        
        <img src="{% static 'app/images/logo.png' %}" alt="Logo" class="logo">
        <h2>Enter OTP</h2>
        <p class="subtitle">We've sent a code to admin@whitehouse.com</p>

        <form method="POST">
            {% csrf_token %}
            <div class="otp-inputs">
                <input type="text" maxlength="1" class="otp-field" required>
                <input type="text" maxlength="1" class="otp-field" required>
                <input type="text" maxlength="1" class="otp-field" required>
                <input type="text" maxlength="1" class="otp-field" required>
            </div>

            <button type="submit" class="verify-btn">Verify & Proceed</button>
        </form>

        <p class="resend-text">Didn't receive code? <a href="#" class="resend-link">Resend</a></p>
    </div>

    <script>
        // Simple script to move focus to next box automatically
        const inputs = document.querySelectorAll('.otp-field');
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
        });
    </script>
</body>
</html>
