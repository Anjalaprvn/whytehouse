<!DOCTYPE html>
<html>
<head>
    <title>Test Children Age Inputs</title>
    <style>
        .input-wrapper {
            background: #F3F4F6;
            border: 1px solid #F0F0F0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 0 15px;
        }
        .input-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 14px 10px;
            outline: none;
        }
    </style>
</head>
<body>
    <h2>Test Children Age Inputs</h2>
    
    <label>Select Number of Children:</label>
    <select id="children-count-select" onchange="updateChildAgeInputs();">
        <option value="0" selected>0 Children</option>
        <option value="1">1 Child</option>
        <option value="2">2 Children</option>
        <option value="3">3 Children</option>
        <option value="4">4 Children</option>
        <option value="5">5 Children</option>
        <option value="6">6 Children</option>
    </select>
    
    <div id="children-ages-container" style="margin-top:20px;"></div>

    <script>
        function updateChildAgeInputs() {
            console.log('Function called!');
            var count = parseInt(document.getElementById('children-count-select').value) || 0;
            console.log('Count:', count);
            var container = document.getElementById('children-ages-container');
            console.log('Container:', container);
            
            if (!container) {
                console.error('Container not found!');
                return;
            }
            
            container.innerHTML = '';
            
            for (var i = 1; i <= count; i++) {
                var div = document.createElement('div');
                div.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;margin-top:6px;';
                div.innerHTML = '<span style="font-size:12px;color:#555;min-width:65px;">Child ' + i + ' age</span><div class="input-wrapper" style="flex:1;"><input type="number" name="child_age_' + i + '" class="child-age-input" placeholder="0-17" min="0" max="17" required></div>';
                container.appendChild(div);
                console.log('Added child', i);
            }
            
            console.log('Total children added:', count);
        }
    </script>
</body>
</html>
